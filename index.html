// SCENE SEQUENCER
// ═══════════════════════════════════════════════════════════════
function SceneSequencer({project,activeIdx,switchScene}){
  const scenes=project?.scenes||[];
  const[dragIdx,setDragIdx]=useState(null);const[playingAll,setPlayingAll]=useState(false);const playRef=useRef(null);

  const moveScene=(from,to)=>{
    if(from===to||to<0||to>=scenes.length)return;
    const arr=[...scenes];const[item]=arr.splice(from,1);arr.splice(to,0,item);
    const updated={...project,scenes:arr};
    projSt.set(s=>({active:updated,list:s.list.map(p=>p.id===updated.id?updated:p),activeSceneIdx:to}));
  };
  const renameScene=(idx)=>{
    const newTitle=prompt('Rename scene:',scenes[idx]?.title);
    if(newTitle&&newTitle.trim()){
      const updated={...project,scenes:scenes.map((s,i)=>i===idx?{...s,title:newTitle.trim()}:s)};
      projSt.set(s=>({active:updated,list:s.list.map(p=>p.id===updated.id?updated:p)}));
    }
  };
  const delScene=(idx)=>{
    if(scenes.length<=1)return;
    const updated={...project,scenes:scenes.filter((_,i)=>i!==idx)};
    const newIdx=Math.min(activeIdx,updated.scenes.length-1);
    projSt.set(s=>({active:updated,activeSceneIdx:newIdx,list:s.list.map(p=>p.id===updated.id?updated:p)}));
  };
  const dupScene=(idx)=>{
    const orig=scenes[idx];const dup={...orig,id:uid(),title:orig.title+' (copy)'};
    const arr=[...scenes];arr.splice(idx+1,0,dup);
    // Also copy keyframes
    if(sceneKfStore[orig.id])sceneKfStore[dup.id]=JSON.parse(JSON.stringify(sceneKfStore[orig.id]));
    const updated={...project,scenes:arr};
    projSt.set(s=>({active:updated,list:s.list.map(p=>p.id===updated.id?updated:p)}));
  };
  const totalDur=scenes.reduce((sum,sc)=>sum+(sc.dur||10000),0);

  // Play all scenes in sequence without mutating scene keyframes
  const playAllScenes=async()=>{
    if(playingAll){setPlayingAll(false);if(playRef.current)playRef.current.cancelled=true;tlSt.set({playing:false});return;}
    const state=projSt.get();
    const liveProject=state.active;
    const startIdx=state.activeSceneIdx;
    const startScene=liveProject?.scenes?.[startIdx];
    if(startScene)saveSceneKfs(startScene.id);
    setPlayingAll(true);
    playRef.current={cancelled:false};
    for(let i=0;i<scenes.length;i++){
      if(playRef.current.cancelled)break;
      switchScene(i,{preserveCurrent:false});
      await new Promise(r=>setTimeout(r,120));
      if(playRef.current.cancelled)break;
      tlSt.set({playMs:0,playing:true});
      await new Promise(resolve=>{
        const check=()=>{
          const s=tlSt.get();
          if(!s.playing){resolve();return;}
          if(playRef.current.cancelled){tlSt.set({playing:false});resolve();return;}
          setTimeout(check,50);
        };
        setTimeout(check,80);
      });
    }
    setPlayingAll(false);
  };
  useEffect(()=>{if(!playRef.current)playRef.current={cancelled:false};},[]);

  return(<div style={{height:60,background:'var(--bg-base)',borderTop:'1px solid var(--border)',display:'flex',flexDirection:'column',flexShrink:0}}>
    <div style={{display:'flex',alignItems:'center',padding:'4px 12px',gap:6,borderBottom:'1px solid var(--border)'}}>
      <span style={{fontSize:10,fontFamily:'var(--fm)',color:'var(--purple)',letterSpacing:'.1em'}}>SCENE SEQUENCER</span>
      <div style={{flex:1}}/>
      <span style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--txt3)'}}>Total: {(totalDur/1000).toFixed(1)}s</span>
      <Btn sz="xs" v={playingAll?'on':'solid'} onClick={playAllScenes}><Ic n={playingAll?'pause':'play'} s={10}/>{playingAll?'Stop':'Play All'}</Btn>
    </div>
    <div style={{flex:1,display:'flex',gap:4,padding:'4px 12px',overflow:'auto',alignItems:'center'}}>
      {scenes.map((sc,i)=>{
        const pct=(sc.dur||10000)/totalDur*100;
        return(<React.Fragment key={sc.id}>
          {i>0&&<div style={{color:'var(--txt3)',fontSize:10}}>→</div>}
          <div draggable onDragStart={()=>setDragIdx(i)} onDragOver={e=>e.preventDefault()}
            onDrop={()=>{if(dragIdx!=null)moveScene(dragIdx,i);setDragIdx(null);}}
            onClick={()=>switchScene(i)}
            style={{padding:'4px 10px',background:i===activeIdx?'var(--accent-dim)':'var(--bg-elevated)',
              border:`1px solid ${i===activeIdx?'var(--accent-bdr)':'var(--border)'}`,borderRadius:4,
              cursor:'grab',minWidth:80,display:'flex',flexDirection:'column',gap:2,
              opacity:dragIdx===i?0.5:1}}>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              <span style={{fontSize:10,fontWeight:600,color:i===activeIdx?'var(--accent)':'var(--txt)'}}>{sc.title}</span>
              <Btn sz="xs" v="ghost" onClick={e=>{e.stopPropagation();renameScene(i);}}><Ic n="type" s={8} c="var(--txt3)"/></Btn>
              <Btn sz="xs" v="ghost" onClick={e=>{e.stopPropagation();dupScene(i);}}><Ic n="copy" s={8} c="var(--txt3)"/></Btn>
              {scenes.length>1&&<Btn sz="xs" v="ghost" onClick={e=>{e.stopPropagation();delScene(i);}}><Ic n="x" s={8} c="var(--red)"/></Btn>}
            </div>
            <span style={{fontSize:8,fontFamily:'var(--fm)',color:'var(--txt3)'}}>{(sc.dur/1000).toFixed(1)}s</span>
          </div>
        </React.Fragment>);
      })}
    </div>
  </div>);
}

// ═══════════════════════════════════════════════════════════════
// VIEWPORT & SETTINGS PANEL
// ═══════════════════════════════════════════════════════════════
const VIEWPORT_PRESETS=[
  {label:'HD   1280×720',w:1280,h:720},
  {label:'FHD  1920×1080',w:1920,h:1080},
  {label:'2K   2560×1440',w:2560,h:1440},
  {label:'4K   3840×2160',w:3840,h:2160},
  {label:'4:3  1440×1080',w:1440,h:1080},
  {label:'1:1  1080×1080',w:1080,h:1080},
  {label:'9:16 1080×1920',w:1080,h:1920},
  {label:'2.39 Cinema',w:2560,h:1072},
];
function ViewportSettingsPanel(){
  const{w:vpW,h:vpH}=useStore(vpSt);
  const[custom,setCustom]=useState(false);
  const durMs=useStore(tlSt,s=>s.durMs);
  const[editDur,setEditDur]=useState(false);const[durInput,setDurInput]=useState('');
  const durRef=useRef(null);

  const applyVp=(w,h)=>{
    vpSt.set({w,h});
    requestAnimationFrame(()=>{try{globalMapRef.current?.resize();}catch{}});
  };

  const commitDur=()=>{
    const s=parseFloat(durInput);
    if(!isNaN(s)&&s>0){
      const ms=Math.round(s*1000);
      tlSt.set({durMs:ms});
      const proj=projSt.get();
      const sc=proj.active?.scenes?.[proj.activeSceneIdx];
      if(sc){const upd={...proj.active,scenes:proj.active.scenes.map((x,i)=>i===proj.activeSceneIdx?{...x,dur:ms}:x)};projSt.set(s2=>({active:upd,list:s2.list.map(p=>p.id===upd.id?upd:p)}));}
    }
    setEditDur(false);
  };

  return(<div style={{padding:'8px 10px',display:'flex',flexDirection:'column',gap:5}}>
    <div style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--txt3)',letterSpacing:'.08em',marginBottom:2}}>VIEWPORT PRESET</div>
    {VIEWPORT_PRESETS.map(p=>(
      <button key={p.label} onClick={()=>{setCustom(false);applyVp(p.w,p.h);}}
        style={{padding:'4px 8px',background:(!custom&&vpW===p.w&&vpH===p.h)?'var(--accent-dim)':'var(--bg-elevated)',
          border:'1px solid '+( (!custom&&vpW===p.w&&vpH===p.h)?'var(--accent-bdr)':'var(--border)'),borderRadius:3,
          color:(!custom&&vpW===p.w&&vpH===p.h)?'var(--accent)':'var(--txt2)',
          fontSize:9,fontFamily:'var(--fm)',cursor:'pointer',textAlign:'left'}}>
        {p.label}
      </button>
    ))}
    <div style={{display:'flex',gap:4,alignItems:'center',marginTop:2}}>
      <span style={{fontSize:11,color:'var(--txt2)',fontFamily:'var(--fm)',width:16}}>W</span>
      <input type="number" value={vpW} onChange={e=>{const v=parseInt(e.target.value)||1920;setCustom(true);applyVp(v,vpH);}}
        style={{flex:1,background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:3,padding:'4px 6px',color:'var(--txt)',fontSize:11,fontFamily:'var(--fm)',outline:'none'}}/>
      <span style={{fontSize:11,color:'var(--txt3)',fontFamily:'var(--fm)'}}>×</span>
      <input type="number" value={vpH} onChange={e=>{const v=parseInt(e.target.value)||1080;setCustom(true);applyVp(vpW,v);}}
        style={{flex:1,background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:3,padding:'4px 6px',color:'var(--txt)',fontSize:11,fontFamily:'var(--fm)',outline:'none'}}/>
    </div>
    <div style={{borderTop:'1px solid var(--border)',paddingTop:6,marginTop:2}}>
      <div style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--txt3)',letterSpacing:'.08em',marginBottom:4}}>TIMELINE DURATION</div>
      <div style={{display:'flex',gap:5,alignItems:'center'}}>
        {editDur
          ?<input ref={durRef} value={durInput} onChange={e=>setDurInput(e.target.value)}
              onBlur={commitDur} onKeyDown={e=>{if(e.key==='Enter')commitDur();if(e.key==='Escape')setEditDur(false);}}
              style={{flex:1,background:'var(--bg-base)',border:'1px solid var(--accent-bdr)',borderRadius:3,color:'var(--accent)',fontSize:11,fontFamily:'var(--fm)',padding:'4px 7px',outline:'none'}}
              autoFocus/>
          :<div onClick={()=>{setDurInput((durMs/1000).toFixed(1));setEditDur(true);setTimeout(()=>durRef.current?.select(),20);}}
              style={{flex:1,padding:'4px 7px',background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:3,color:'var(--txt2)',fontSize:11,fontFamily:'var(--fm)',cursor:'text'}}>
            {(durMs/1000).toFixed(1)}s
          </div>}
        <span style={{fontSize:9,color:'var(--txt3)',fontFamily:'var(--fm)'}}>sec</span>
      </div>
      <div style={{display:'flex',gap:3,flexWrap:'wrap',marginTop:4}}>
        {[5,10,15,20,30,60].map(s=>(
          <button key={s} onClick={()=>{const ms=s*1000;tlSt.set({durMs:ms});const proj=projSt.get();const sc=proj.active?.scenes?.[proj.activeSceneIdx];if(sc){const upd={...proj.active,scenes:proj.active.scenes.map((x,i)=>i===proj.activeSceneIdx?{...x,dur:ms}:x)};projSt.set(s2=>({active:upd,list:s2.list.map(p=>p.id===upd.id?upd:p)}));}}}
            style={{padding:'2px 6px',background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:3,color:'var(--txt3)',fontSize:9,fontFamily:'var(--fm)',cursor:'pointer'}}>
            {s}s
          </button>
        ))}
      </div>
    </div>
  </div>);
}

// ═══════════════════════════════════════════════════════════════
// EDITOR SHELL — Scene switching saves/loads keyframes
// ═══════════════════════════════════════════════════════════════
// ── Resizable Left Panel ─────────────────────────────────────────────────
function LeftPanel({panel}){
  const[w,setW]=useState(310);const resizing=useRef(false);const panelNonce=useStore(appSt,s=>s.panelNonce);
  const onMouseMove=useCallback(e=>{if(resizing.current)setW(v=>Math.max(220,Math.min(520,v+e.movementX)));},[]);
  const onMouseUp=useCallback(()=>{resizing.current=false;},[]);
  useEffect(()=>{window.addEventListener('mousemove',onMouseMove);window.addEventListener('mouseup',onMouseUp);return()=>{window.removeEventListener('mousemove',onMouseMove);window.removeEventListener('mouseup',onMouseUp);};},[]);
  return(<div style={{width:w,display:'flex',flexDirection:'column',borderRight:'1px solid var(--border)',background:'var(--bg-panel)',flexShrink:0,overflow:'hidden',position:'relative'}}>
    <div style={{display:'flex',borderBottom:'1px solid var(--border)',flexShrink:0}}>
      {PANELS.map(p=>(<button key={p.id} onClick={()=>{
        if(p.id==='layers'){
          const st=layerSt.get(), ms=mapSt.get();
          const next=ensureLayerOrder(st).filter(id=>!String(id).startsWith('bm-'));
          if(JSON.stringify(next)!==JSON.stringify((st.layerOrder||[]).filter(id=>!String(id).startsWith('bm-')))) layerSt.set({layerOrder:next});
          syncVisualOrder(ensureVisualOrder(st, ms), st, ms);
        }
        appSt.set(s=>({panel:p.id,panelNonce:(s.panelNonce||0)+1}));
      }} style={{flex:1,height:34,display:'flex',alignItems:'center',justifyContent:'center',gap:4,background:panel===p.id?'var(--bg-elevated)':'transparent',border:'none',borderBottom:`2px solid ${panel===p.id?'var(--accent)':'transparent'}`,cursor:'pointer',color:panel===p.id?'var(--accent)':'var(--txt2)',fontSize:11,fontFamily:'var(--ff)',transition:'color .12s'}}><Ic n={p.ic} s={11} c={panel===p.id?'var(--accent)':'var(--txt2)'}/>{p.lb}</button>))}
    </div>
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {panel==='layers'&&<LayersPanel key={'layers-'+panelNonce}/>}{panel==='labels'&&<LabelsPanel key={'labels-'+panelNonce}/>}{panel==='overlays'&&<OverlaysPanel key={'overlays-'+panelNonce}/>}{panel==='borders'&&<BorderPanel key={'borders-'+panelNonce}/>}{panel==='export'&&<ExportPanel key={'export-'+panelNonce}/>}
    </div>
    {/* Resize handle */}
    <div onMouseDown={e=>{e.preventDefault();resizing.current=true;}} style={{position:'absolute',top:0,right:0,width:4,height:'100%',cursor:'col-resize',zIndex:20,background:'transparent'}} onMouseEnter={e=>e.currentTarget.style.background='var(--accent-bdr)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}/>
  </div>);
}

// ── Resizable Right Panel ─────────────────────────────────────────────────
function RightPanel(){
  const[w,setW]=useState(210);const resizing=useRef(false);
  const onMouseMove=useCallback(e=>{if(resizing.current)setW(v=>Math.max(160,Math.min(380,v-e.movementX)));},[]);
  const onMouseUp=useCallback(()=>{resizing.current=false;},[]);
  useEffect(()=>{window.addEventListener('mousemove',onMouseMove);window.addEventListener('mouseup',onMouseUp);return()=>{window.removeEventListener('mousemove',onMouseMove);window.removeEventListener('mouseup',onMouseUp);};},[]);
  return(<div style={{width:w,borderLeft:'1px solid var(--border)',background:'var(--bg-panel)',flexShrink:0,display:'flex',flexDirection:'column',overflow:'visible',position:'relative'}}>
    <div onMouseDown={e=>{e.preventDefault();resizing.current=true;}} style={{position:'absolute',top:0,bottom:0,left:-2,width:4,cursor:'col-resize',zIndex:60,background:'transparent'}} onMouseEnter={e=>e.currentTarget.style.background='var(--accent-bdr)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}/>
    <div style={{flex:1,overflow:'auto',minHeight:0}}>
      <PH title="CAMERA"/><CamPanel/><Divider/><PH title="BASEMAP"/><BasemapPanel/><GlobeAtmospherePanel/><Divider/><PH title="VIEWPORT"/><ViewportSettingsPanel/>
      <div style={{flex:1}}/><Divider/>
      <div style={{padding:'10px 12px',flexShrink:0}}>
        <div style={{fontSize:11,fontFamily:'var(--fm)',color:'var(--txt2)',lineHeight:'18px'}}>
          <span style={{color:'var(--txt)',fontWeight:700,display:'block',marginBottom:4}}>SHORTCUTS</span>
          <span style={{color:'var(--accent)'}}>V</span> Select · <span style={{color:'var(--accent)'}}>H</span> Pan<br/>
          <span style={{color:'var(--accent)'}}>R</span> Route · <span style={{color:'var(--accent)'}}>A</span> Arrow<br/>
          <span style={{color:'var(--accent)'}}>L</span> Label · <span style={{color:'var(--accent)'}}>M</span> Marker<br/>
          <span style={{color:'var(--accent)'}}>Space</span> Play/Pause<br/>
          <span style={{color:'var(--accent)'}}>Del</span> Delete KF
        </div>
      </div>
    </div>
  </div>);
}

// ── Map Viewport Frame — enforces aspect ratio ─────────────────────────────
function MapViewportFrame(){
  const frameRef=useRef(null);const[dims,setDims]=useState({w:0,h:0});
  const{w:vpW,h:vpH}=useStore(vpSt);
  useEffect(()=>{
    const el=frameRef.current;if(!el)return;
    const ro=new ResizeObserver(([e])=>{
      const{width,height}=e.contentRect;
      const aspect=vpW/vpH;
      let fw=width,fh=width/aspect;
      if(fh>height){fh=height;fw=height*aspect;}
      setDims({w:Math.floor(fw),h:Math.floor(fh)});
      requestAnimationFrame(()=>{try{globalMapRef.current?.resize();}catch{}});
    });
    ro.observe(el);return()=>ro.disconnect();
  },[vpW,vpH]);
  return(<div ref={frameRef} id="map-viewport-frame" style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'repeating-conic-gradient(var(--bg-elevated) 0% 25%,var(--bg-base) 0% 50%) 0 0/14px 14px'}}>
    {dims.w>0&&<div id="map-viewport-inner" style={{width:dims.w,height:dims.h,position:'relative',overflow:'hidden',boxShadow:'0 0 0 2px var(--border-hi),0 8px 40px rgba(0,0,0,.7)',borderRadius:1}}>
      <MapCanvas/>
      <div style={{position:'absolute',bottom:4,right:6,fontFamily:'var(--fm)',fontSize:9,color:'rgba(255,255,255,.3)',pointerEvents:'none',zIndex:10}}>{vpW}×{vpH}</div>
    </div>}
  </div>);
}

const TOOLS=[{id:'select',ic:'cursor',lb:'Select V'},{id:'pan',ic:'map',lb:'Pan H'},{id:'route-draw',ic:'route',lb:'Route R'},{id:'arrow-draw',ic:'arrow',lb:'Arrow A'},{id:'label-place',ic:'type',lb:'Label L'},{id:'marker-place',ic:'pin',lb:'Marker M'}];
const PANELS=[{id:'layers',ic:'layers',lb:'Layers'},{id:'labels',ic:'tag',lb:'Labels'},{id:'overlays',ic:'map',lb:'Overlays'},{id:'borders',ic:'border',lb:'Borders'},{id:'export',ic:'dl',lb:'Export'}];

function EditorShell(){
  const{tool,panel,showTL,showSearch}=useStore(appSt);const project=useStore(projSt,s=>s.active);const activeSceneIdx=useStore(projSt,s=>s.activeSceneIdx);
  const[tlH,setTlH]=useState(230);const resizingTL=useRef(false);
  const activeScene=project?.scenes?.[activeSceneIdx];

  // Scene switching: save current, load new
  const switchScene=(idx,opts={})=>{
    const preserveCurrent=opts.preserveCurrent!==false;
    const state=projSt.get();
    const currentProject=state.active;
    const currentIdx=state.activeSceneIdx;
    const currentScene=currentProject?.scenes?.[currentIdx];
    if(preserveCurrent&&currentScene)saveSceneKfs(currentScene.id);
    projSt.set({activeSceneIdx:idx});
    const newScene=currentProject?.scenes?.[idx];
    if(newScene)loadSceneKfs(newScene.id,newScene.dur);
  };

  const addScene=()=>{
    if(!project)return;
    const sc={id:uid(),title:`Scene ${project.scenes.length+1}`,dur:10000};
    const updated={...project,scenes:[...project.scenes,sc]};
    projSt.set(s=>({active:updated,list:s.list.map(p=>p.id===updated.id?updated:p)}));
  };

  useEffect(()=>{
    const onKey=e=>{const tag=e.target.tagName;if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA')return;const k=e.key;
      if(k===' '){e.preventDefault();tlSt.set(s=>({playing:!s.playing}));return;}
      if(k==='v')appSt.set({tool:'select'});if(k==='h')appSt.set({tool:'pan'});
      if(k==='r'){appSt.set({tool:'route-draw'});routeSt.set({active:true});}
      if(k==='a'){appSt.set({tool:'arrow-draw'});layerSt.set({_arrowDraft:[]});}
      if(k==='l'){const first=labelSt.get().tmpls[0];if(first)labelSt.set({placing:first.id});appSt.set({tool:'label-place',panel:'labels'});}
      if(k==='m')appSt.set({tool:'marker-place'});
      if(k==='Escape'){appSt.set({tool:'select',showSearch:false});labelSt.set({placing:null});routeSt.set({draft:[],active:false});layerSt.set({_arrowDraft:null});}
      if(k==='Home')tlSt.set({playMs:0,playing:false});
      if(k==='Delete'||k==='Backspace'){const{selKf}=tlSt.get();if(selKf)tlSt.set(s=>({tracks:s.tracks.map(tr=>tr.id!==selKf.trackId?tr:{...tr,kfs:tr.kfs.filter(k=>k.id!==selKf.kfId)}),selKf:null}));}
    };window.addEventListener('keydown',onKey);return()=>window.removeEventListener('keydown',onKey);},[]);

  const onMouseMove=useCallback(e=>{if(resizingTL.current)setTlH(h=>clamp(h-e.movementY,80,500));},[]);
  useEffect(()=>{
    const mm=e=>{if(resizingTL.current)setTlH(h=>clamp(h-e.movementY,80,500));};
    const mu=()=>{resizingTL.current=false;};
    window.addEventListener('mousemove',mm);window.addEventListener('mouseup',mu);
    return()=>{window.removeEventListener('mousemove',mm);window.removeEventListener('mouseup',mu);};
  },[]);

  return(<div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',background:'var(--bg-void)',overflow:'hidden'}}>
    {/* Top bar */}
    <div style={{height:'var(--topbar)',display:'flex',alignItems:'center',gap:8,padding:'0 10px',borderBottom:'1px solid var(--border)',flexShrink:0,background:'var(--bg-panel)'}}>
      <button onClick={()=>{const cs=project?.scenes?.[activeSceneIdx];if(cs)saveSceneKfs(cs.id);appSt.set({view:'dashboard'});}} style={{fontFamily:'var(--fd)',fontSize:20,letterSpacing:'.05em',color:'var(--accent)',background:'none',border:'none',cursor:'pointer'}}>MD</button>
      <Divider v/><span style={{fontSize:12,color:'var(--txt2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:150}}>{project?.title||'Untitled'}</span>
      {/* Scene selector */}
      {project?.scenes&&<>
        <div style={{display:'flex',gap:2,alignItems:'center'}}>
          {project.scenes.map((sc,i)=>(<button key={sc.id} onClick={()=>switchScene(i)}
            onDoubleClick={()=>{const newTitle=prompt('Rename scene:',sc.title);if(newTitle&&newTitle.trim()){const updated={...project,scenes:project.scenes.map((s,idx)=>idx===i?{...s,title:newTitle.trim()}:s)};projSt.set(s=>({active:updated,list:s.list.map(p=>p.id===updated.id?updated:p)}));}}}
            style={{padding:'3px 8px',background:i===activeSceneIdx?'var(--accent-dim)':'var(--bg-elevated)',border:`1px solid ${i===activeSceneIdx?'var(--accent-bdr)':'var(--border)'}`,borderRadius:3,color:i===activeSceneIdx?'var(--accent)':'var(--txt2)',fontSize:11,fontFamily:'var(--fm)',cursor:'pointer',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={sc.title+' (dbl-click to rename)'}>
            {sc.title}
          </button>))}
          <Btn sz="xs" v="ghost" onClick={addScene} title="Add scene"><Ic n="plus" s={10}/></Btn>
        </div>
      </>}
      <div style={{flex:1}}/>
      <Btn sz="sm" v="solid" onClick={()=>appSt.set(s=>({showSearch:!s.showSearch}))}><Ic n="search" s={12}/>Search</Btn>
      <Divider v/><Btn sz="sm" on={showTL} onClick={()=>appSt.set(s=>({showTL:!s.showTL}))}><Ic n="film" s={12}/>Timeline</Btn>
    </div>
    {/* Body */}
    <div style={{flex:1,minHeight:0,display:'flex',overflow:'hidden',position:'relative'}}>
      {/* Tool sidebar */}
      <div style={{width:38,display:'flex',flexDirection:'column',alignItems:'center',padding:'6px 0',gap:3,borderRight:'1px solid var(--border)',background:'var(--bg-panel)',flexShrink:0}}>
        {TOOLS.map(t=>(<button key={t.id} title={t.lb} onClick={()=>{appSt.set({tool:t.id});if(t.id==='route-draw')routeSt.set({active:true});else routeSt.set({draft:[],active:false});if(t.id==='arrow-draw')layerSt.set({_arrowDraft:[]});else layerSt.set({_arrowDraft:null});if(t.id==='label-place'){const first=labelSt.get().tmpls[0];if(first)labelSt.set({placing:first.id});appSt.set({panel:'labels'});}}}
          style={{width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'var(--r)',border:tool===t.id?'1px solid var(--accent-bdr)':'1px solid transparent',cursor:'pointer',background:tool===t.id?'var(--accent-dim)':'transparent',transition:'all .12s'}}>
          <Ic n={t.ic} s={15} c={tool===t.id?'var(--accent)':'var(--txt2)'}/>
        </button>))}
        {/* Theme toggle at bottom */}
        <div style={{flex:1}}/>
        <button title="Toggle dark/light mode" onClick={()=>appSt.set(s=>({theme:s.theme==='dark'?'light':'dark'}))}
          style={{width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'var(--r)',border:'1px solid transparent',cursor:'pointer',background:'transparent',color:'var(--txt3)',fontSize:14}} onMouseEnter={e=>e.currentTarget.style.color='var(--txt)'} onMouseLeave={e=>e.currentTarget.style.color='var(--txt3)'}>
          ☀
        </button>
      </div>
      {/* Left panel — resizable */}
      <LeftPanel panel={panel}/>
      {/* Map center — viewport-constrained */}
      <div style={{flex:1,position:'relative',overflow:'hidden',background:'var(--bg-void)'}}>
        <MapViewportFrame/>
        {showSearch&&<SearchPanel onClose={()=>appSt.set({showSearch:false})}/>}
        {(tool==='route-draw'||tool==='label-place'||tool==='marker-place'||tool==='arrow-draw')&&<div style={{position:'absolute',top:10,left:'50%',transform:'translateX(-50%)',background:'var(--accent)',color:'#000',padding:'5px 16px',borderRadius:20,fontSize:12,fontWeight:700,fontFamily:'var(--ff)',pointerEvents:'none',zIndex:10,whiteSpace:'nowrap',boxShadow:'0 4px 16px rgba(0,0,0,.4)'}}>{tool==='route-draw'&&'✏ Route — click waypoints · dbl-click finish'}{tool==='arrow-draw'&&'➜ Arrow — click points · dbl-click finish'}{tool==='label-place'&&'⌖ Label — click map · type text'}{tool==='marker-place'&&'⊕ Marker — click to place'}</div>}
      </div>
      {/* Right panel — resizable */}
      <RightPanel/>
    </div>
    {project?.scenes&&<div style={{height:60,flexShrink:0,borderTop:'1px solid var(--border)',borderBottom:'1px solid var(--border)',background:'var(--bg-panel)'}}><SceneSequencer project={project} activeIdx={activeSceneIdx} switchScene={switchScene}/></div>}
    {showTL&&<div style={{height:tlH,flexShrink:0,position:'relative'}}><div style={{position:'absolute',top:0,left:0,right:0,height:5,cursor:'row-resize',zIndex:20}} onMouseDown={()=>{resizingTL.current=true;}}/><Timeline/></div>}
  </div>);
}

// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
function App(){const view=useStore(appSt,s=>s.view);return(<div style={{width:'100vw',height:'100vh',overflow:'hidden'}}>{view==='dashboard'?<Dashboard/>:<EditorShell/>}</div>);}
(window.ReactDOM || ReactDOM).createRoot(document.getElementById('root')).render(<App/>);
</script>
