<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
    "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/",

<script type="module">
import * as THREE from 'three';
import { TilesRenderer } from '3d-tiles-renderer';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/examples/jsm/loaders/DRACOLoader.js';
import { KTX2Loader } from 'three/examples/jsm/loaders/KTX2Loader.js';

(function(){
  const DEFAULT_LAYER_ID='md-3dtiles-layer';

  function ecefToLngLatAlt(x,y,z){
  function degToRad(v){ return (v*Math.PI)/180; }
  function greatCircleKm(aLng,aLat,bLng,bLat){
    const R=6371;
    const dLat=degToRad(bLat-aLat);
    const dLng=degToRad(bLng-aLng);
    const s1=Math.sin(dLat/2), s2=Math.sin(dLng/2);
    const q=s1*s1 + Math.cos(degToRad(aLat))*Math.cos(degToRad(bLat))*s2*s2;
    return 2*R*Math.asin(Math.min(1, Math.sqrt(Math.max(0,q))));
  }

    const a=6378137.0;
    const e2=6.69437999014e-3;
    const b=a*Math.sqrt(1-e2);
    const ep2=(a*a-b*b)/(b*b);
    const p=Math.sqrt(x*x+y*y);
    const th=Math.atan2(a*z,b*p);
    const lon=Math.atan2(y,x);
    const lat=Math.atan2(z+ep2*b*Math.pow(Math.sin(th),3), p-e2*a*Math.pow(Math.cos(th),3));
    const n=a/Math.sqrt(1-e2*Math.sin(lat)*Math.sin(lat));
    const alt=p/Math.cos(lat)-n;
    return { lng:(lon*180)/Math.PI, lat:(lat*180)/Math.PI, alt };
  }

  window.MapDirector3DTiles = {
    createController(map, getOptions){
      let camera=null, scene=null, renderer=null, tiles=null, localTransform=null, mapInstance=null;
      let currentKey='';
      let disposed=false;
      let lastError='';
      let moveSyncTimer=0;
      const layerId=DEFAULT_LAYER_ID;
      const mapListeners=[];

      function mercatorEnabled(){
        try{
          const p=map.getProjection && map.getProjection();
          if(!p) return true;
          return (typeof p === 'string' ? p : p.name || p.type) !== 'globe';
        }catch(_){ return true; }
      }

      function emitStatus(status, extra={}){
        window.dispatchEvent(new CustomEvent('md:3dtiles-status', { detail:{ status, error:lastError, ...extra } }));
      }

      function firstLabelLayerId(){
        try{
          const style=map.getStyle && map.getStyle();
          const layers=(style && style.layers) || [];
          const found=layers.find(l=>l && l.type==='symbol');
          return found ? found.id : undefined;
        }catch(_){ return undefined; }
      }

      function cleanupTiles(){
        if(tiles){
          try{ tiles.dispose(); }catch(_){ }
          try{ if(scene && tiles.group && tiles.group.parent===scene) scene.remove(tiles.group); }catch(_){ }
        }
        tiles=null;
        localTransform=null;
      }

      function removeLayer(){
        cleanupTiles();
        try{ if(map.getLayer(layerId)) map.removeLayer(layerId); }catch(_){ }
      }

      function destroy(){
        disposed=true;
        if(moveSyncTimer){ clearTimeout(moveSyncTimer); moveSyncTimer=0; }
        mapListeners.forEach(([ev,fn])=>{ try{ map.off(ev, fn); }catch(_){ } });
        mapListeners.length=0;
        removeLayer();
        camera=null; scene=null; renderer=null; mapInstance=null;
        emitStatus('destroyed');
      }

      function updateLocalTransform(modelOrigin=[0,0,0], rotate=[Math.PI/2,0,0]){
        const mc=maplibregl.MercatorCoordinate.fromLngLat([modelOrigin[0], modelOrigin[1]], modelOrigin[2]);
        const axisX=new THREE.Vector3(1,0,0);
        const axisY=new THREE.Vector3(0,1,0);
        const axisZ=new THREE.Vector3(0,0,1);
        const rotationX=new THREE.Matrix4().makeRotationAxis(axisX, rotate[0]);
        const rotationY=new THREE.Matrix4().makeRotationAxis(axisY, rotate[1]);
        const rotationZ=new THREE.Matrix4().makeRotationAxis(axisZ, rotate[2]);
        const scale=mc.meterInMercatorCoordinateUnits();
        localTransform=new THREE.Matrix4()
          .makeTranslation(mc.x, mc.y, mc.z)
          .scale(new THREE.Vector3(scale, -scale, scale))
          .multiply(rotationX)
          .multiply(rotationY)
          .multiply(rotationZ);
      }

      function getEffectiveOpts(){
        return ((typeof getOptions==='function' ? getOptions() : {}) || {});
      }

      function applyIonAuth(tilesInstance, rootUrl, authToken){
        if(!tilesInstance) return;
        const base=new URL(rootUrl, window.location.href);
        const decorate=(uri)=>{
          const next=new URL(uri, base);
          for(const [k,v] of base.searchParams.entries()) if(!next.searchParams.has(k)) next.searchParams.set(k, v);
          return next.toString();
        };
        tilesInstance.fetchOptions = tilesInstance.fetchOptions || {};
        tilesInstance.fetchOptions.headers = { ...(tilesInstance.fetchOptions.headers||{}) };
        if(authToken) tilesInstance.fetchOptions.headers.Authorization = `Bearer ${authToken}`;
        tilesInstance.preprocessURL = decorate;
        tilesInstance.onPreprocessURL = decorate;
      }

      function initTiles(url, altOffset=0, focusOpts={}, ionAssetId='', ionTileToken=''){
        cleanupTiles();
        const gltfLoader=new GLTFLoader();
        const dracoLoader=new DRACOLoader();
        dracoLoader.setDecoderPath('https://unpkg.com/three@0.183.0/examples/jsm/libs/draco/');
        gltfLoader.setDRACOLoader(dracoLoader);
        const ktx2Loader=new KTX2Loader();
        ktx2Loader.setTranscoderPath('https://unpkg.com/three@0.183.0/examples/jsm/libs/basis/');
        ktx2Loader.detectSupport(renderer);
        gltfLoader.setKTX2Loader(ktx2Loader);

        tiles=new TilesRenderer(url);
        applyIonAuth(tiles, url, ionTileToken);
        tiles.group.name='md-3dtiles-group';
        tiles.manager.addHandler(/\.(gltf|glb)$/i, gltfLoader);
        tiles.errorTarget=4;
        tiles.lruCache.maxSize=12000;
        tiles.lruCache.maxBytesSize=4 * 2 ** 30;
        tiles.setCamera(camera);
        tiles.setResolutionFromRenderer(camera, renderer);
        scene.add(tiles.group);

        const mapCenter=map.getCenter ? map.getCenter() : { lng:0, lat:0 };
        updateLocalTransform([mapCenter.lng || 0, mapCenter.lat || 0, Number.isFinite(+altOffset)?+altOffset:0]);

        let handled=false;
        const onLoadTileset=()=>{
          if(handled || !tiles) return;
          handled=true;
          try{
            let located=null;
            try{
              const sphere=new THREE.Sphere();
              tiles.getBoundingSphere(sphere);
              const center=sphere.center.clone();
              const { lng, lat, alt } = ecefToLngLatAlt(center.x, center.y, center.z);
              if(Number.isFinite(lng) && Number.isFinite(lat)) located={ lng, lat, alt, radius:Math.max(0, sphere.radius || 0) };
            }catch(_){ }
            if(located && Number.isFinite(located.lng) && Number.isFinite(located.lat) && Math.abs(located.lat) <= 90){
              const finalAlt=(located.alt || 0) + (Number.isFinite(+altOffset)?+altOffset:0);
              updateLocalTransform([located.lng, located.lat, finalAlt]);
              if(focusOpts && focusOpts.autoFocus !== false && Math.abs(located.lat) < 89.9){
                const z = Number.isFinite(+focusOpts.zoom) ? +focusOpts.zoom : Math.max(map.getZoom ? map.getZoom() : 0, 15.5);
                const p = Number.isFinite(+focusOpts.pitch) ? +focusOpts.pitch : Math.max(map.getPitch ? map.getPitch() : 0, 55);
                const b = Number.isFinite(+focusOpts.bearing) ? +focusOpts.bearing : (map.getBearing ? map.getBearing() : 0);
                try{ map.jumpTo({ center:[located.lng, located.lat], zoom:z, pitch:p, bearing:b }); }catch(_){ }
              }
              emitStatus('located', { url, ionAssetId, lng:located.lng, lat:located.lat, alt:finalAlt, radius:located.radius });
            } else {
              emitStatus('ready', { url, ionAssetId, global:true });
            }
            map.triggerRepaint();
          }catch(err){
            lastError=err?.message || String(err);
            emitStatus('error', { url, ionAssetId });
            console.warn('3D tiles transform failed', err);
          }
        };
        tiles.addEventListener('load-tileset', onLoadTileset);
      }

      function buildLayer(url, altOffset, focusOpts, ionAssetId, ionTileToken){
        return {
          id: layerId,
          type: 'custom',
          renderingMode: '3d',
          onAdd(mapArg, gl){
            mapInstance=mapArg;
            camera=new THREE.PerspectiveCamera();
            scene=new THREE.Scene();
            scene.add(new THREE.AmbientLight(0xffffff, 3));
            renderer=new THREE.WebGLRenderer({ canvas:mapArg.getCanvas(), context:gl, antialias:true });
            renderer.autoClear=false;
            lastError='';
            emitStatus('loading', { url, ionAssetId });
            initTiles(url, altOffset, focusOpts, ionAssetId, ionTileToken);
          },
          render(_gl, args){
            if(disposed || !camera || !renderer || !scene || !localTransform) return;
            try{
              camera.projectionMatrix.fromArray(args.defaultProjectionData.mainMatrix);
              camera.projectionMatrix.multiply(localTransform);
              if(tiles){
                tiles.setCamera(camera);
                tiles.setResolutionFromRenderer(camera, renderer);
                tiles.update();
              }
              renderer.resetState();
              renderer.render(scene, camera);
              mapInstance && mapInstance.triggerRepaint();
            }catch(err){
              lastError=err?.message || String(err);
              emitStatus('error', { url, ionAssetId });
              console.warn('3D tiles render failed', err);
            }
          },
          onRemove(){ cleanupTiles(); }
        };
      }

      function sync(){
        if(disposed) return;
        const opts=getEffectiveOpts();
        const enabled=!!opts.enabled;
        const url=(opts.url || '').trim();
        const ionAssetId=String(opts.ionAssetId || '');
        const ionTileToken=(opts.ionTileAccessToken || '').trim();
        const altOffset=Number.isFinite(+opts.altOffset) ? +opts.altOffset : 0;
        const focusOpts={
          autoFocus: opts.autoFocus !== false,
          zoom: Number.isFinite(+opts.focusZoom) ? +opts.focusZoom : undefined,
          pitch: Number.isFinite(+opts.focusPitch) ? +opts.focusPitch : undefined,
          bearing: Number.isFinite(+opts.focusBearing) ? +opts.focusBearing : undefined,
        };

        if(!mercatorEnabled()){
          removeLayer();
          currentKey='__blocked_globe__';
          emitStatus('blocked-globe', { ionAssetId });
          return;
        }

        if(!enabled || !url){
          removeLayer();
          currentKey='';
          emitStatus(enabled ? 'missing-url' : 'idle', { ionAssetId });
          return;
        }

        const nextKey=JSON.stringify({ url, altOffset, focusOpts, ionAssetId, token:!!ionTileToken });
        if(currentKey===nextKey && map.getLayer(layerId)) return;

        removeLayer();
        const beforeId=firstLabelLayerId();
        try{
          map.addLayer(buildLayer(url, altOffset, focusOpts, ionAssetId, ionTileToken), beforeId);
          currentKey=nextKey;
        }catch(err){
          lastError=err?.message || String(err);
          emitStatus('error', { ionAssetId });
          console.warn('Failed to add 3D tiles layer', err);
        }
      }

      function scheduleSync(delay=60){
        if(moveSyncTimer) clearTimeout(moveSyncTimer);
        moveSyncTimer=setTimeout(()=>{ moveSyncTimer=0; sync(); }, delay);
      }

      function focusToLastView(view){
        if(!view || !view.center || !Array.isArray(view.center)) return;
        try{
          map.jumpTo({
            center:view.center,
            zoom:Number.isFinite(+view.zoom) ? +view.zoom : (map.getZoom ? map.getZoom() : 16),
            pitch:Number.isFinite(+view.pitch) ? +view.pitch : (map.getPitch ? map.getPitch() : 55),
            bearing:Number.isFinite(+view.bearing) ? +view.bearing : (map.getBearing ? map.getBearing() : 0),
          });
        }catch(_){ }
      }

      ['moveend','zoomend','rotateend','pitchend','style.load'].forEach(ev=>{
        const fn=()=>scheduleSync(ev==='style.load' ? 30 : 80);
        mapListeners.push([ev,fn]);
        try{ map.on(ev, fn); }catch(_){ }
      });

      return { sync, destroy, removeLayer, focusToLastView, scheduleSync };
    }
  };
})();
</script>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useReducer,useMemo}=React;

async function resolveCesiumIonAssetEndpoint(token, assetId){
  const res=await fetch(`https://api.cesium.com/v1/assets/${assetId}/endpoint`, { headers:{ Authorization:`Bearer ${token}` } });
  if(!res.ok) throw new Error(`Cesium ion endpoint ${res.status}`);
  const json=await res.json();
  const url=((json&&json.url)||(json&&json.options&&json.options.url)||'').trim();
  const accessToken=((json&&json.accessToken)||'').trim();
  if(!url) throw new Error('Endpoint returned no tileset url');
  return { url, accessToken, raw:json };
}

  {id:'mapbox-custom',label:'Mapbox Custom',swatch:'#1a2a3a',cat:'Mapbox',
   url:'https://api.mapbox.com/styles/v1/xsleuthx/ckp3d9a5r79ul18k83vsv4vnk/wmts?access_token=',

  {id:'bing-sat',label:'Bing Satellite',swatch:'#0a2a0a',cat:'Satellite',

   rasterStyle:{version:8,sources:{'bing-sat':{type:'raster',tiles:['https://ecn.t0.tiles.virtualearth.net/tiles/a{quadkey}.jpeg?g=587&mkt=en-gb&n=z','https://ecn.t1.tiles.virtualearth.net/tiles/a{quadkey}.jpeg?g=587&mkt=en-gb&n=z'],tileSize:256,maxzoom:19}},layers:[{id:'bing-sat-layer',type:'raster',source:'bing-sat'}]},
   note:'Bing aerial'},
  {id:'esri-sat',label:'ESRI Satellite',swatch:'#0a1a2a',cat:'Satellite',
   isRaster:true,
   rasterStyle:{version:8,sources:{'esri-sat':{type:'raster',tiles:['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],tileSize:256,maxzoom:19,attribution:'ESRI'}},layers:[{id:'esri-sat-layer',type:'raster',source:'esri-sat'}]},
   note:'ESRI World'},

function csvSplit(line){
  const out=[];let cur='';let q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){
      if(q&&line[i+1]==='"'){cur+='"';i++;}
      else q=!q;
    }else if(ch===','&&!q){out.push(cur);cur='';}
    else cur+=ch;
  }
  out.push(cur);return out;
}
function parseCSV(text){
  const lines=String(text||'').replace(/^\ufeff/,'').split(/\r?\n/).filter(Boolean);
  if(!lines.length)return[];
  const headers=csvSplit(lines[0]);
  return lines.slice(1).map(line=>{
    const vals=csvSplit(line);const row={};headers.forEach((h,i)=>row[h]=vals[i]??'');return row;
  });
}
const pickNum=(obj,keys)=>{for(const k of keys){const v=parseFloat(obj?.[k]);if(Number.isFinite(v))return v;}return null;};
const pickStr=(obj,keys,fb='')=>{for(const k of keys){const v=obj?.[k];if(v!=null&&String(v).trim())return String(v);}return fb;};
function extractLatLng(row,mapCfg={}){
  const latKeys=mapCfg.latKeys||['latitude','lat','LATITUDE','Latitude','y'];
  const lngKeys=mapCfg.lngKeys||['longitude','lon','lng','LONGITUDE','Longitude','x'];
  let lat=pickNum(row,latKeys);
  let lng=pickNum(row,lngKeys);
  if(Number.isFinite(lat)&&Number.isFinite(lng)) return {lat,lng};
  const nested=[row?.city_coords,row?.coords,row?.coordinates,row?.location,row?.geo,row?.position,row?.centroid];
  for(const n of nested){
    if(!n) continue;
    if(Array.isArray(n) && n.length>=2){
      const a=parseFloat(n[0]), b=parseFloat(n[1]);
      if(Number.isFinite(a)&&Number.isFinite(b)){
        if(Math.abs(a)<=90 && Math.abs(b)<=180) return {lat:a,lng:b};
        if(Math.abs(a)<=180 && Math.abs(b)<=90) return {lat:b,lng:a};
      }
    }
    if(typeof n==='string'){
      const m=n.match(/(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)/);
      if(m){
        const a=parseFloat(m[1]), b=parseFloat(m[2]);
        if(Number.isFinite(a)&&Number.isFinite(b)){
          if(Math.abs(a)<=90 && Math.abs(b)<=180) return {lat:a,lng:b};
          if(Math.abs(a)<=180 && Math.abs(b)<=90) return {lat:b,lng:a};
        }
      }
    }
    if(typeof n==='object'){
      lat=pickNum(n,latKeys) ?? pickNum(n,['lat','latitude','y']);
      lng=pickNum(n,lngKeys) ?? pickNum(n,['lng','lon','longitude','x']);
      if(Number.isFinite(lat)&&Number.isFinite(lng)) return {lat,lng};
    }
  }
  return {lat:null,lng:null};
}
function normalizeRowsToPoints(rows, mapCfg={}){
  const feats=(rows||[]).map((row,i)=>{
    const pos=extractLatLng(row,mapCfg);
    const lat=pos.lat, lng=pos.lng;
    if(!Number.isFinite(lat)||!Number.isFinite(lng))return null;
    const props={};
    Object.keys(row||{}).slice(0,24).forEach(k=>props[k]=row[k]);
    props.name=pickStr(row,mapCfg.nameKeys||['name','title','NAME','port_name','facility_name','airport_name'],`${mapCfg.fallbackName||'Feature'} ${i+1}`);
    props.source=mapCfg.source||props.source||'';
    return {type:'Feature',geometry:{type:'Point',coordinates:[lng,lat]},properties:props};
  }).filter(Boolean);
  return {type:'FeatureCollection',features:feats};
}
async function fetchGitHubTree(owner,repo,branch='main'){
  let r=await fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`);
  if(!r.ok&&branch!=='master')r=await fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees/master?recursive=1`);
  if(!r.ok)throw new Error(`GitHub tree unavailable (${owner}/${repo})`);
  return r.json();
}
async function fetchGitHubText(owner,repo,path,branch='main'){
  const url=`https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${path}`;
  let r=await fetch(url);
  if(!r.ok&&branch!=='master')r=await fetch(`https://raw.githubusercontent.com/${owner}/${repo}/master/${path}`);
  if(!r.ok)throw new Error(`GitHub raw fetch failed (${path})`);
  return r.text();
}

    : 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson';

  return r.json();
}

async function fetchAirportsGlobal(){

function normalizeFlightBounds(bounds){
  if(!bounds) return null;
  const clamp=(v,min,max)=>Math.max(min, Math.min(max, Number(v)));
  let south=clamp(bounds.south,-85,85), north=clamp(bounds.north,-85,85);
  let west=Number(bounds.west), east=Number(bounds.east);
  if(!Number.isFinite(south)||!Number.isFinite(north)||!Number.isFinite(west)||!Number.isFinite(east)) return null;
  if(north < south){ const t=north; north=south; south=t; }
  const normLon=(lon)=>{ let x=((lon+180)%360+360)%360-180; if(x===-180) x=180; return x; };
  west=normLon(west); east=normLon(east);
  const span=((east - west + 360) % 360);
  if(span === 0 || span > 170 || east < west) return null;
  const latSpan=Math.abs(north-south);
  if(latSpan > 55 || span > 80) return null;
  return { south, west, north, east, span, latSpan };
}

async function fetchFlightsLive(bounds){
  const safeBounds=normalizeFlightBounds(bounds);
  if(!safeBounds) return __airFetchState.lastGood || getAirEmptyFC();
  const now=Date.now();
  const lastGood=()=>__airFetchState.lastGood || getAirEmptyFC();

  if(now < __airFetchState.localCooldownUntil || now < __airFetchState.authFailedUntil){
    return lastGood();
  }
  try{
    const fc=await fetchOpenSkyRelay(safeBounds);
    if(fc?.features?.length){
      __airFetchState.lastGood=fc;
      return fc;
    }
  }catch(err){
    const msg=String(err && err.message || err || '');
    if(/401\b/.test(msg)){
      __airFetchState.authFailedUntil=Date.now()+30*60*1000;
    }else if(/\b(429|502|503|504)\b/.test(msg)){
      __airFetchState.localCooldownUntil=Date.now()+5*60*1000;
    }else{
      __airFetchState.localCooldownUntil=Date.now()+2*60*1000;
    }
    if(Date.now() > __airFetchState.warnAt){
      console.warn(`OpenSky relay unavailable; falling back to public/ADSB path. ${msg}`);
      __airFetchState.warnAt=Date.now()+15000;
    }
  }

  if(now >= __airFetchState.remoteCooldownUntil){
    try{
      const fc=await fetchOpenSkyPublic(safeBounds);
      if(fc?.features?.length){
        __airFetchState.lastGood=fc;
        return fc;
      }
    }catch(err){
      const msg=String(err && err.message || err || '');
      if(/\b(401|403|429|5\d\d)\b/.test(msg)) __airFetchState.remoteCooldownUntil=Date.now()+5*60*1000;
      if(Date.now() > __airFetchState.warnAt){
        console.warn(`OpenSky public path unavailable; reusing cached flight snapshot. ${msg}`);
        __airFetchState.warnAt=Date.now()+15000;
      }
    }
  }
  return lastGood();
}

function sanitizeLiveShipFeature(f,i=0){
  const geom=f?.geometry;

  const p={...(f?.properties||{})};
  const headingRaw=p.heading??p.course??p.cog??p.Cog??p.trueHeading??p.TrueHeading??p.bearing;
  const heading=Number.isFinite(parseFloat(headingRaw))?parseFloat(headingRaw):0;
  const mmsi=String(p.mmsi??p.MMSI??p.userid??p.UserID??p.id??p.vessel_id??'').trim();
  const name=String((p.name??p.ShipName??p.shipName??p.vessel_name??p.vesselName??mmsi)||`Vessel ${i+1}`).trim();

  const lat=parseFloat(rec.latitude??rec.lat??rec.Latitude??md.latitude??md.Latitude??md.lat??pr.Latitude);

function syncVisualOrder(order, layerState=layerSt.get(), mapState=mapSt.get()){

function interpNumericKfs(kfs,ms,fallback){
  const arr=[...(kfs||[])].sort((a,b)=>a.ms-b.ms);
  if(!arr.length) return fallback;
  if(arr.length===1) return Number(arr[0].value);
  if(ms<=arr[0].ms) return Number(arr[0].value);
  if(ms>=arr[arr.length-1].ms) return Number(arr[arr.length-1].value);
  let i=0;while(i<arr.length-1&&arr[i+1].ms<=ms)i++;

  const t=(EASINGS[b.easing]||EASINGS.easeInOutCubic)(clamp((ms-a.ms)/(b.ms-a.ms),0,1));

function interpCam(tracks,ms){
  const camTracks=tracks.filter(t=>t.type==='camera');
  if(!camTracks.length)return null;
  let best=null;
  for(const ct of camTracks){
    if(!ct.kfs.length)continue;
    const sorted=[...ct.kfs].sort((a,b)=>a.ms-b.ms);
    const first=sorted[0].ms,last=sorted[sorted.length-1].ms;
    if(ms>=first&&ms<=last){best=ct;break;}
    if(!best)best=ct;
  }
  if(!best||!best.kfs.length)return camTracks[0]?.kfs?.[0]?.cam||null;
  const kfs=[...best.kfs].sort((a,b)=>a.ms-b.ms);
  let cam;
  if(kfs.length===1) cam={...kfs[0].cam};
  else if(ms<=kfs[0].ms) cam={...kfs[0].cam};
  else if(ms>=kfs[kfs.length-1].ms) cam={...kfs[kfs.length-1].cam};
  else{
    let i=0;while(i<kfs.length-1&&kfs[i+1].ms<=ms)i++;
    const a=kfs[i],b=kfs[i+1];
    const t=(EASINGS[b.easing]||EASINGS.easeInOutCubic)(clamp((ms-a.ms)/(b.ms-a.ms),0,1));
    cam={zoom:lerp(a.cam.zoom,b.cam.zoom,t),lat:lerp(a.cam.lat,b.cam.lat,t),
      lng:lerp(a.cam.lng,b.cam.lng,t),bearing:lerp(a.cam.bearing,b.cam.bearing,t),
      pitch:lerp(a.cam.pitch,b.cam.pitch,t)};
  }
  const parentId=best.parentCameraId||best.id;
  const zoomTrack=tracks.find(t=>t.type==='cameraZoom'&&t.parentCameraId===parentId);
  const bearingTrack=tracks.find(t=>t.type==='cameraBearing'&&t.parentCameraId===parentId);
  const pitchTrack=tracks.find(t=>t.type==='cameraPitch'&&t.parentCameraId===parentId);
  if(zoomTrack?.kfs?.length) cam.zoom=interpNumericKfs(zoomTrack.kfs,ms,cam.zoom);
  if(bearingTrack?.kfs?.length) cam.bearing=interpNumericKfs(bearingTrack.kfs,ms,cam.bearing);
  if(pitchTrack?.kfs?.length) cam.pitch=interpNumericKfs(pitchTrack.kfs,ms,cam.pitch);
  return cam;
}

// Interpolate opacity track — returns {globalOpacity, layerOpacities:{[id]:opacity}, labelOpacity, markerOpacity}
function interpOpacity(tracks,ms){
  const opTracks=tracks.filter(t=>t.type==='opacity');
  if(!opTracks.length)return null;
  // Merge all opacity tracks (use first one with kfs spanning ms)
  let best=null;
  for(const ot of opTracks){
    if(!ot.kfs.length)continue;
    const sorted=[...ot.kfs].sort((a,b)=>a.ms-b.ms);
    const first=sorted[0].ms,last=sorted[sorted.length-1].ms;
    if(ms>=first&&ms<=last){best=ot;break;}
    if(!best)best=ot;
  }
  if(!best||!best.kfs.length)return null;
  const kfs=[...best.kfs].sort((a,b)=>a.ms-b.ms);
  if(kfs.length===1)return{...kfs[0].props};
  if(ms<=kfs[0].ms)return{...kfs[0].props};
  if(ms>=kfs[kfs.length-1].ms)return{...kfs[kfs.length-1].props};
  let i=0;while(i<kfs.length-1&&kfs[i+1].ms<=ms)i++;
  const a=kfs[i],b=kfs[i+1];
  const t=(EASINGS[b.easing]||EASINGS.easeInOutCubic)(clamp((ms-a.ms)/(b.ms-a.ms),0,1));
  const ap=a.props||{},bp=b.props||{};
  const result={};
  // Interpolate all numeric props that exist in both keyframes
  const allKeys=new Set([...Object.keys(ap),...Object.keys(bp)]);
  for(const k of allKeys){
    const av=ap[k]??1,bv=bp[k]??1;
    result[k]=lerp(av,bv,t);
  }
  return result;
}

// Interpolate per-layer track keyframes → {[layerId]: {opacity, scale}}
function interpLayerKf(tracks,ms){
  const layerTracks=tracks.filter(t=>t.type==='layer');
  const result={};
  for(const lt of layerTracks){
    if(!lt.kfs.length)continue;
    const kfs=[...lt.kfs].sort((a,b)=>a.ms-b.ms);
    const start=kfs[0].ms||0, end=kfs[kfs.length-1].ms||0;
    let val;
    if(ms<start || ms>end){
      val={opacity:0,scale:1,active:false,start,end};
    } else if(kfs.length===1){
      val={...(kfs[0].props||{}),active:true,start,end};
    } else if(ms===start){
      val={...(kfs[0].props||{}),active:true,start,end};
    } else if(ms===end){
      val={...(kfs[kfs.length-1].props||{}),active:true,start,end};
    } else {
      let i=0;while(i<kfs.length-1&&kfs[i+1].ms<=ms)i++;
      const a=kfs[i],b=kfs[i+1];
      const span=Math.max(1,b.ms-a.ms);
      const t2=(EASINGS[b.easing]||EASINGS.easeInOutCubic)(clamp((ms-a.ms)/span,0,1));
      val={
        opacity:lerp(a.props?.opacity??1,b.props?.opacity??1,t2),
        scale:lerp(a.props?.scale??1,b.props?.scale??1,t2),
        active:true,start,end,
      };
    }
    result[lt.layerId]=val;
  }
  return result;
}
function getTrackWindowForLayer(layerId, tracks=tlSt.get().tracks||[], durMs=tlSt.get().durMs||0){
  const tr=(tracks||[]).find(t=>t.type==='layer' && t.layerId===layerId);
  if(!tr) return {start:0,end:durMs,active:true,hasTrack:false};
  const win=getItemTrackWindow(tr,durMs);
  return {start:win.start,end:win.end,active:true,hasTrack:true};
}
function isLayerActiveAtTime(layerId, ms, tracks=tlSt.get().tracks||[], durMs=tlSt.get().durMs||0){
  const tr=(tracks||[]).find(t=>t.type==='layer' && t.layerId===layerId);
  if(!tr) return true;
  const win=getItemTrackWindow(tr,durMs);
  return ms>=win.start && ms<=win.end;
}


function arrowHeadPath(type,size){
  const s=size||10;
  switch(type){
    case 'triangle':return`M0,${-s/2} L${s},0 L0,${s/2} Z`;
    case 'stealth':return`M0,${-s/2} L${s},0 L0,${s/2} L${s*0.3},0 Z`;
    case 'diamond':return`M0,0 L${s/2},${-s/2} L${s},0 L${s/2},${s/2} Z`;
    default:return'';
  }
}

function mkStore(init){
  let state={...init};const subs=new Set();
  const notify=()=>subs.forEach(fn=>fn(state));
  return{
    get:()=>state,
    set(patch){state=typeof patch==='function'?{...state,...patch(state)}:{...state,...patch};notify();},
    sub(fn){subs.add(fn);return()=>subs.delete(fn);},
  };
}
function useStore(store,sel=s=>s){
  const selRef=useRef(sel);
  selRef.current=sel;
  const [val,setVal]=useState(()=>sel(store.get()));
  useEffect(()=>{
    const pick=(state)=>selRef.current(state);
    setVal(prev=>{
      const next=pick(store.get());
      return Object.is(prev,next)?prev:next;
    });
    return store.sub(state=>{
      const next=pick(state);
      setVal(prev=>Object.is(prev,next)?prev:next);
    });
  },[store]);
  return val;
}

    tlSt.set({tracks:stored.tracks,playMs:0,durMs:stored.durMs||dur||12000,playing:false,selKf:null});

const TERRAIN_DEM_SOURCE_ID='md-dem-terrain';
const HILLSHADE_DEM_SOURCE_ID='md-dem-hillshade';
const HILLSHADE_LAYER_ID='md-hillshade';
const MINIMAP_VIEWPORT_SRC='md-mini-viewport';
// AWS Terrain Tiles (Mapzen Terrarium format) — open CORS, no API key, confirmed working
const TERRAIN_TILES=['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'];
const TERRAIN_ENCODING='terrarium';
const TERRAIN_READY_EVENT='idle';

function clearTerrainSupport(map){
  if(!map) return;
  try{ map.setTerrain(null); }catch{}
  try{ if(map.getLayer(HILLSHADE_LAYER_ID)) map.removeLayer(HILLSHADE_LAYER_ID); }catch{}
}

function whenMapStyleReady(map, fn){
  if(!map || typeof fn!=='function') return false;
  try{
    if(typeof map.isStyleLoaded==='function' && map.isStyleLoaded()){
      fn();
      return true;
    }
    let done=false;
    const retry=()=>{
      if(done) return;
      try{
        if(typeof map.isStyleLoaded==='function' && !map.isStyleLoaded()) return;
        done=true;
        fn();
      }catch(err){ console.warn('style-ready callback failed', err); }
    };
    map.once('style.load', ()=>requestAnimationFrame(retry));
    map.once('idle', ()=>requestAnimationFrame(retry));
    setTimeout(retry, 60);
    return false;
  }catch(err){ console.warn('style-ready guard failed', err); return false; }
}


const STYLE_SPEC_CACHE=new Map();
async function fetchStyleJsonWithCache(url){
  const key=String(url||'');
  if(STYLE_SPEC_CACHE.has(key)) return JSON.parse(JSON.stringify(STYLE_SPEC_CACHE.get(key)));
  const res=await fetch(url,{cache:'force-cache'});
  if(!res.ok) throw new Error(`Style fetch failed ${res.status}`);
  const json=await res.json();
  STYLE_SPEC_CACHE.set(key,json);
  return JSON.parse(JSON.stringify(json));
}

function applyProjectionMode(map, globeEnabled){
  if(!map||typeof map.setProjection!=='function') {
    console.warn('projection API unavailable in this MapLibre build');
    return false;
  }
  const run=()=>{
    try{
      map.setProjection({type: globeEnabled ? 'globe' : 'mercator'});
      return true;
    }catch(err){
      try{ map.setProjection(globeEnabled ? 'globe' : 'mercator'); return true; }
      catch(err2){ console.warn('projection switch failed', err2); return false; }
    }
  };
  return whenMapStyleReady(map, run);
}

function normalizeDeg(v){
  let n=Number(v)||0;
  while(n<=-180) n+=360;
  while(n>180) n-=360;
  return n;
}

function getGlobeSkySpec(style){
  const s=style||mapSt.get().globeAtmosphereStyle||{};
  const clamp01=(v,d)=>Number.isFinite(+v)?Math.max(0,Math.min(1,+v)):d;
  return {
    'sky-color': s.atmosphereColor || s.skyColor || '#0b1220',
    'horizon-color': s.horizonColor || '#3a78ff',
    'fog-color': s.fogColor || '#0f172a',
    'sky-horizon-blend': clamp01(s.skyHorizonBlend, 0.45),
    'horizon-fog-blend': clamp01(s.horizonFogBlend, 0.8),
    'fog-ground-blend': clamp01(s.fogGroundBlend, 0.5),
    'atmosphere-blend': clamp01(s.atmosphereBlend, 1)
  };
}

function hexToRgb(hex){
  const v=String(hex||'').trim();
  const m=v.match(/^#?([0-9a-fA-F]{6})$/);
  if(m){
    const n=m[1];
    return [parseInt(n.slice(0,2),16),parseInt(n.slice(2,4),16),parseInt(n.slice(4,6),16)];
  }
  const rgb=v.match(/rgba?\((\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);
  if(rgb) return [parseInt(rgb[1],10),parseInt(rgb[2],10),parseInt(rgb[3],10)];
  return [255,255,255];
}
function rgba(hex,a){ const [r,g,b]=hexToRgb(hex); return `rgba(${r},${g},${b},${a})`; }

function getGlobeOverlayCss(globeEnabled, atmosphereEnabled, style, cam){
  const s=style||mapSt.get().globeAtmosphereStyle||{};
  const blend=Math.max(0,Math.min(1,Number(s.atmosphereBlend)||0));
  const horizon=Math.max(0,Math.min(1,Number(s.skyHorizonBlend)||0.45));
  const zoom=Math.max(0, Number(cam?.zoom)||0);
  const pitch=Math.max(0, Number(cam?.pitch)||0);
  const map=globalMapRef.current;
  let centerX=50, centerY=50, globeRadius=0;
  try{
    if(map && typeof map.project==='function' && typeof map.getContainer==='function'){
      const c=map.getCenter && map.getCenter();
      const ctr=map.project(c);
      const container=map.getContainer();
      const w=Math.max(1, container.clientWidth||1);
      const h=Math.max(1, container.clientHeight||1);
      centerX=(ctr.x/w)*100;
      centerY=(ctr.y/h)*100;
      const east=map.project([c.lng+90, c.lat]);
      const west=map.project([c.lng-90, c.lat]);
      // Sample both northward AND southward so either pole is handled correctly.
      // Near the north pole lat+45 bunches up (small ry_n), but lat-45 still spans
      // a large screen distance → ry_s is accurate. Take the larger of the two.
      const latN=Math.max(-85, Math.min(85, c.lat+45));
      const latS=Math.max(-85, Math.min(85, c.lat-45));
      const north=map.project([c.lng, latN]);
      const south=map.project([c.lng, latS]);
      const r1=Math.abs(east.x-ctr.x)/w*100;
      const r2=Math.abs(west.x-ctr.x)/w*100;
      const r3n=Math.abs(north.y-ctr.y)/h*100;
      const r3s=Math.abs(south.y-ctr.y)/h*100;
      const rx=Math.max(0, Math.min(r1||0, r2||0) || Math.max(r1||0, r2||0));
      // Use the larger vertical sample — whichever pole direction has more screen room
      const ry=Math.max(0, r3n||0, r3s||0);
      const baseRadius=Math.max(rx||0, ry||0);
      const refZoom=0.73;
      const zoomRadius=Math.max(12.5, Math.min(46, 17.2 * Math.pow(2, (zoom-refZoom)*0.34)));
      globeRadius=Math.max(zoomRadius, Math.max(8, Math.min(48, baseRadius*1.18)));
    }
  }catch{}
  if(!globeRadius){
    globeRadius=Math.max(13.5, Math.min(32, 9.4 + zoom*3.45 - Math.max(0,pitch-20)*0.016));
    centerY=50 + Math.min(2.8, pitch*0.01);
  }
  // Use zoom 0.73 as the reference point where the halo was visually hugging the globe.
  // Scale the halo thickness from that reference so the glow stays attached across zooms.
  const refZoom=0.73;
  const zoomScale=Math.pow(2, (zoom-refZoom)*0.16);
  const edge=Math.max(10, globeRadius + 0.06);
  const haloThickness=Math.max(2.2, globeRadius*0.19*zoomScale);
  const haloNear=Math.min(96, edge + haloThickness*0.48 + blend*0.18 + horizon*0.12);
  const haloMid=Math.min(97.8, edge + haloThickness*1.02 + blend*0.28 + horizon*0.2);
  const haloOuter=Math.min(99.3, edge + haloThickness*1.92 + blend*0.36 + horizon*0.24);
  return {
    position:'absolute',
    inset:0,
    zIndex:1,
    pointerEvents:'none',
    opacity:(globeEnabled&&atmosphereEnabled)?1:0,
    transition:'opacity .18s ease',

function applyGlobeAtmosphere(map, globeEnabled, atmosphereEnabled, style){

        cam.zoom=Number(map.getZoom && map.getZoom())||0;

function addTerrainSupport(map, opts={}){
  if(!map) return false;
  const enabled=!!opts.enabled;
  const hillshade=!!opts.hillshade;
  const exaggeration=Math.max(1, Number(opts.exaggeration)||1);
  if(!enabled && !hillshade){
    clearTerrainSupport(map);
    return true;
  }
  try{
    // Add DEM sources if not already present (they may be pre-baked into raster styles)
    if(!map.getSource(TERRAIN_DEM_SOURCE_ID)){
      map.addSource(TERRAIN_DEM_SOURCE_ID,{
        type:'raster-dem',tiles:TERRAIN_TILES,encoding:TERRAIN_ENCODING,
        minzoom:0,maxzoom:15,tileSize:256,
        attribution:'Elevation tiles © AWS / Mapzen Terrarium'
      });
    }
    if(!map.getSource(HILLSHADE_DEM_SOURCE_ID)){
      map.addSource(HILLSHADE_DEM_SOURCE_ID,{
        type:'raster-dem',tiles:TERRAIN_TILES,encoding:TERRAIN_ENCODING,
        minzoom:0,maxzoom:15,tileSize:256,
        attribution:'Elevation tiles © AWS / Mapzen Terrarium'
      });
    }
  }catch(err){console.warn('DEM source failed',err); return false;}
  try{
    if(enabled && map.getSource(TERRAIN_DEM_SOURCE_ID)){
      console.log('[Terrain] setTerrain →', TERRAIN_DEM_SOURCE_ID, 'exaggeration:', exaggeration);
      map.setTerrain({source:TERRAIN_DEM_SOURCE_ID, exaggeration});
      // Re-call setTerrain once tiles are actually loaded (handles cold-cache case)
      const reTerrain=(e)=>{
        if(e && e.sourceId===TERRAIN_DEM_SOURCE_ID && e.isSourceLoaded){
          try{ map.setTerrain({source:TERRAIN_DEM_SOURCE_ID, exaggeration}); }catch{}
          map.off('sourcedata',reTerrain);
        }
      };
      map.off('sourcedata',reTerrain); // defensive remove before re-add
      map.on('sourcedata',reTerrain);
      setTimeout(()=>{ try{map.off('sourcedata',reTerrain);}catch{} }, 8000);
    } else {
      map.setTerrain(null);
    }
  }catch(err){console.warn('setTerrain failed',err);}
  try{
    const hasLayer=!!map.getLayer(HILLSHADE_LAYER_ID);
    if(hillshade && map.getSource(HILLSHADE_DEM_SOURCE_ID)){
      if(!hasLayer){
        const firstSymbol=(map.getStyle()?.layers||[]).find(l=>l.type==='symbol');
        map.addLayer({
          id:HILLSHADE_LAYER_ID,
          type:'hillshade',
          source:HILLSHADE_DEM_SOURCE_ID,
          paint:{'hillshade-shadow-color':'#1b2430','hillshade-highlight-color':'#dde6ef','hillshade-accent-color':'#8a96a3','hillshade-exaggeration':0.35}
        }, firstSymbol?firstSymbol.id:undefined);
      }
    }else if(hasLayer){
      map.removeLayer(HILLSHADE_LAYER_ID);
    }
  }catch(err){console.warn('hillshade failed',err);}
  return true;
}

function ensureMiniViewportLayers(map){

function boundsToFeature(bounds){
  if(!bounds)return {type:'FeatureCollection',features:[]};
  const sw=bounds.getSouthWest(), ne=bounds.getNorthEast();
  const nw={lng:sw.lng,lat:ne.lat}, se={lng:ne.lng,lat:sw.lat};
  return {type:'FeatureCollection',features:[{type:'Feature',geometry:{type:'Polygon',coordinates:[[
    [sw.lng,sw.lat],[se.lng,se.lat],[ne.lng,ne.lat],[nw.lng,nw.lat],[sw.lng,sw.lat]
  ]]},properties:{}}]};
}

function reorderViewportLayers(map){
  // Layer panel: top of panel = highest z, bottom of panel = lowest z.
  // orderedVisualItems[0]=bottom(lowest z) … [last]=top(highest z).
  //
  // Strategy: two-pass approach.
  // Pass 1 (bottom→top): Move all md-* layers to top of the MapLibre stack
  //   in REVERSE desired order, so they end up stacked correctly. Each
  //   successive moveLayer(id) without a beforeId moves to the very top —
  //   so iterating bottom→top results in top item being topmost.
  // Pass 2: System layers (mask, minimap) always go on absolute top.
  //
  // For fg layers: simple moveLayer(id) bottom→top works.
  // For raster basemaps: same — they have explicit md-bm-* layers.
  // For vector primary basemap: its layers live in the native style and
  //   cannot be moved above md-bm-* layers. The md-bm-* rasters always
  //   land above the vector style layers after addRasterBasemapLayer.
  //   So: rasters ABOVE the vector primary in panel = correct (they're on top).
  //   Rasters BELOW the vector primary: they will appear above the vector
  //   since we can't move native style layers. For now, honour the panel order
  //   for rasters among themselves and all fg items.
  try{
    const style=map.getStyle(); if(!style) return;
    const ordered=orderedVisualItems(layerSt.get(), mapSt.get()); // [0]=bottom … [n]=top
    const getIds=()=>(map.getStyle()?.layers||[]).map(l=>l.id);
    const collect=(item)=>{
      const ids=getIds();
      if(item._t==='basemap')  return ids.filter(id=>id.startsWith(`md-bm-${item.id}`));
      if(item._t==='feat')     return ids.filter(id=>id.startsWith(`md-feat-${item.id}`));
      if(item._t==='routes')   return ids.filter(id=>id.startsWith(`md-route-${item.id}`));
      if(item._t==='borders')  return ids.filter(id=>id.startsWith(`md-border-${item.id}`));
      if(item._t==='labels')   return ids.filter(id=>id.startsWith(`md-lbl-${item.id}`));
      if(item._t==='markers')  return ids.filter(id=>id.startsWith(`md-mkr-${item.id}`));
      if(item._t==='arrows')   return ids.filter(id=>id.startsWith(`md-arr-${item.id}`));
      return [];
    };

    // Stage background: always at absolute bottom of md-* layers
    try{ if(map.getLayer(STAGE_BG_LAYER_ID)) map.moveLayer(STAGE_BG_LAYER_ID); }catch{}

    // Move all ordered items bottom→top (each moveLayer(id) goes to top of stack,
    // so iterating from lowest to highest results in correct stacking order).
    const stackItems=ordered.filter(i=>i._t!=='stagebg'); // [0]=bottom, [last]=top
    for(const item of stackItems){
      const ids=collect(item);
      if(!ids.length) continue; // vector primary basemap — skip, sits at bottom natively
      // Move bottom sub-layer first, then each subsequent one goes above it
      for(const id of ids){
        try{ map.moveLayer(id); }catch{}
      }
    }

    // System layers always on absolute top
    const sysTop=[STAGE_MASK_LAYER_ID,STAGE_MASK_LINE_LAYER_ID,'md-mini-viewport-fill','md-mini-viewport-line'];
    sysTop.forEach(id=>{try{if(map.getLayer(id))map.moveLayer(id);}catch{}});
  }catch(err){console.warn('reorder viewport layers failed',err);}
}

    <div ref={ctnRef} style={{width:'100%',height:'100%',opacity:google3dEnabled?0:1,pointerEvents:google3dEnabled?'none':'auto'}}/>
    <div ref={cesiumHostRef} style={{position:'absolute',inset:0,zIndex:5,display:google3dEnabled?'block':'none'}}/>
    {google3dEnabled&&google3dShowBadge&&<div className="md-google3d-badge">Google Maps 3D</div>}
    {!ready&&<div style={{position:'absolute',inset:0,background:'var(--bg-base)',display:'flex',alignItems:'center',justifyContent:'center',gap:10}}><div style={{width:16,height:16,border:'2px solid var(--accent-bdr)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin .8s linear infinite'}}/><span style={{color:'var(--txt3)',fontFamily:'var(--fm)',fontSize:11}}>Loading map…</span></div>}
    {/* Overlay HUD — AE-style bezier + position drag */}
    {!google3dEnabled&&ready&&(()=>{
      const map=mapRef.current; if(!map) return null;
      /* ── shared helpers ── */
      const geo2s=ll=>map.project([ll.lng,ll.lat]);
      const s2geo=sc=>{const ll=map.unproject(sc);return{lng:ll.lng,lat:ll.lat};};
      /* build straight-line ctrlPts for any wpts array */
      const mkCtrl=w2=>w2.slice(0,-1).map((_,i)=>{
        const s0=geo2s(w2[i]),s1=geo2s(w2[i+1]);
        const g1=s2geo({x:s0.x+(s1.x-s0.x)/3,y:s0.y+(s1.y-s0.y)/3});
        const g2=s2geo({x:s0.x+2*(s1.x-s0.x)/3,y:s0.y+2*(s1.y-s0.y)/3});
        return{c1lng:g1.lng,c1lat:g1.lat,c2lng:g2.lng,c2lat:g2.lat,broken:false};
      });
      /* get screen pos of c1/c2 for a segment, falling back to straight-line default */
      const ctrlSc=(seg,ps0,ps1)=>{
        if(!ps0||!ps1)return{c1:null,c2:null};
        return{
          c1:seg?map.project([seg.c1lng,seg.c1lat]):{x:ps0.x+(ps1.x-ps0.x)/3,y:ps0.y+(ps1.y-ps0.y)/3},
          c2:seg?map.project([seg.c2lng,seg.c2lat]):{x:ps0.x+2*(ps1.x-ps0.x)/3,y:ps0.y+2*(ps1.y-ps0.y)/3},
        };
      };
      /* generic map-drag: calls cb(ll) on every mousemove */
      const mapDrag=(e,cb)=>{
        e.stopPropagation();e.preventDefault();
        const onMv=ev=>{const r=map.getCanvas().getBoundingClientRect();cb(map.unproject([ev.clientX-r.left,ev.clientY-r.top]));};
        const onUp=()=>{window.removeEventListener('mousemove',onMv);window.removeEventListener('mouseup',onUp);};
        window.addEventListener('mousemove',onMv);window.addEventListener('mouseup',onUp);
      };
      /* mirror opposite tangent through anchor (AE smooth-node behaviour) */
      const mirror=(ctrl,segIdx,which,handleLl,wpts2)=>{
        if(ctrl[segIdx]?.broken)return;
        const anchor=which==='c1'?wpts2[segIdx]:wpts2[segIdx+1];
        const asc=geo2s(anchor),hsc=geo2s(handleLl);
        const mll=s2geo({x:2*asc.x-hsc.x,y:2*asc.y-hsc.y});
        if(which==='c1'&&segIdx>0)  ctrl[segIdx-1]={...ctrl[segIdx-1],c2lng:mll.lng,c2lat:mll.lat};
        if(which==='c2'&&segIdx<ctrl.length-1) ctrl[segIdx+1]={...ctrl[segIdx+1],c1lng:mll.lng,c1lat:mll.lat};
      };

      /* ── ARROW bezier ── */
      const selArrow=selId?arrows.find(a=>a.id===selId):null;
      const aWpts=selArrow?(selArrow.wpts&&selArrow.wpts.length>=2?selArrow.wpts:[selArrow.from,selArrow.to].filter(Boolean)):[];
      const aSP=aWpts.map(w=>project(w.lng,w.lat));
      const aSegs=aWpts.slice(0,-1).map((_,i)=>ctrlSc(selArrow?.ctrlPts?.[i],aSP[i],aSP[i+1]));

      const dragAHandle=(segIdx,which,altKey,e)=>{
        const cur=layerSt.get().arrows.find(a=>a.id===selId);if(!cur)return;
        const w2=cur.wpts&&cur.wpts.length>=2?cur.wpts:[cur.from,cur.to].filter(Boolean);
        const ctrl=cur.ctrlPts?cur.ctrlPts.map(s=>({...s})):mkCtrl(w2);
        if(altKey) ctrl[segIdx]={...ctrl[segIdx],broken:true};
        mapDrag(e,ll=>{
          ctrl[segIdx]={...ctrl[segIdx],[which==='c1'?'c1lng':'c2lng']:ll.lng,[which==='c1'?'c1lat':'c2lat']:ll.lat};
          mirror(ctrl,segIdx,which,ll,w2);
          layerSt.set(s=>({arrows:s.arrows.map(a=>a.id===selId?{...a,ctrlPts:[...ctrl]}:a)}));
        });
      };
      const dragAWpt=(wptIdx,e)=>{
        mapDrag(e,ll=>{
          layerSt.set(s=>({arrows:s.arrows.map(a=>{
            if(a.id!==selId)return a;
            const w=[...(a.wpts&&a.wpts.length>=2?a.wpts:[a.from,a.to].filter(Boolean))];
            const osc=geo2s(w[wptIdx]),nsc=geo2s(ll);
            const dx=nsc.x-osc.x,dy=nsc.y-osc.y;
            w[wptIdx]={lng:ll.lng,lat:ll.lat};
            const ctrl=a.ctrlPts?a.ctrlPts.map((seg,si)=>{
              const patch={};
              if(si===wptIdx-1){const sc=geo2s({lng:seg.c2lng,lat:seg.c2lat});const g=s2geo({x:sc.x+dx,y:sc.y+dy});patch.c2lng=g.lng;patch.c2lat=g.lat;}
              if(si===wptIdx){const sc=geo2s({lng:seg.c1lng,lat:seg.c1lat});const g=s2geo({x:sc.x+dx,y:sc.y+dy});patch.c1lng=g.lng;patch.c1lat=g.lat;}
              return Object.keys(patch).length?{...seg,...patch}:seg;
            }):null;
            return{...a,wpts:w,from:w[0],to:w[w.length-1],ctrlPts:ctrl};
          })}));
        });
      };
      const dragAAll=(e)=>{
        const cur=layerSt.get().arrows.find(a=>a.id===selId);if(!cur)return;
        const r0=map.getCanvas().getBoundingClientRect();
        const originLl=map.unproject([e.clientX-r0.left,e.clientY-r0.top]);
        const w2=cur.wpts&&cur.wpts.length>=2?cur.wpts:[cur.from,cur.to].filter(Boolean);
        mapDrag(e,ll=>{
          const osc=geo2s(originLl),nsc=geo2s(ll);
          const dx=nsc.x-osc.x,dy=nsc.y-osc.y;
          const nw=w2.map(w=>{const sc=geo2s(w);return s2geo({x:sc.x+dx,y:sc.y+dy});});
          const nc=cur.ctrlPts?cur.ctrlPts.map(seg=>{
            const s1=geo2s({lng:seg.c1lng,lat:seg.c1lat}),s2=geo2s({lng:seg.c2lng,lat:seg.c2lat});
            const g1=s2geo({x:s1.x+dx,y:s1.y+dy}),g2=s2geo({x:s2.x+dx,y:s2.y+dy});
            return{...seg,c1lng:g1.lng,c1lat:g1.lat,c2lng:g2.lng,c2lat:g2.lat};
          }):null;
          layerSt.set(s=>({arrows:s.arrows.map(a=>a.id===selId?{...a,wpts:nw,from:nw[0],to:nw[nw.length-1],ctrlPts:nc}:a)}));
        });
      };
      const breakACorner=(wptIdx,e)=>{
        e.stopPropagation();e.preventDefault();
        const cur=layerSt.get().arrows.find(a=>a.id===selId);if(!cur)return;
        const w2=cur.wpts&&cur.wpts.length>=2?cur.wpts:[cur.from,cur.to].filter(Boolean);
        const ctrl=cur.ctrlPts?cur.ctrlPts.map(s=>({...s})):mkCtrl(w2);
        const isNowBroken=!(ctrl[wptIdx-1]?.broken||ctrl[wptIdx]?.broken);
        if(wptIdx>0)ctrl[wptIdx-1]={...ctrl[wptIdx-1],broken:isNowBroken};
        if(wptIdx<ctrl.length)ctrl[wptIdx]={...ctrl[wptIdx],broken:isNowBroken};
        layerSt.set(s=>({arrows:s.arrows.map(a=>a.id===selId?{...a,ctrlPts:[...ctrl]}:a)}));
      };

      /* ── ROUTE bezier (same logic) ── */
      const selRoute=selId?routes.find(r=>r.id===selId):null;
      const rWpts=selRoute?.wpts||[];
      const rSP=rWpts.map(w=>project(w.lng,w.lat));
      const rSegs=rWpts.slice(0,-1).map((_,i)=>ctrlSc(selRoute?.ctrlPts?.[i],rSP[i],rSP[i+1]));

      const dragRHandle=(segIdx,which,altKey,e)=>{
        const cur=layerSt.get().routes.find(r=>r.id===selId);if(!cur)return;
        const ctrl=cur.ctrlPts?cur.ctrlPts.map(s=>({...s})):mkCtrl(cur.wpts||[]);
        if(altKey)ctrl[segIdx]={...ctrl[segIdx],broken:true};
        mapDrag(e,ll=>{
          ctrl[segIdx]={...ctrl[segIdx],[which==='c1'?'c1lng':'c2lng']:ll.lng,[which==='c1'?'c1lat':'c2lat']:ll.lat};
          mirror(ctrl,segIdx,which,ll,cur.wpts||[]);
          layerSt.set(s=>({routes:s.routes.map(r=>r.id===selId?{...r,ctrlPts:[...ctrl]}:r)}));
        });
      };
      const dragRWpt=(wptIdx,e)=>{
        const cur=layerSt.get().routes.find(r=>r.id===selId);if(!cur)return;
        mapDrag(e,ll=>{
          layerSt.set(s=>({routes:s.routes.map(r=>{
            if(r.id!==selId)return r;
            const w=[...(r.wpts||[])];
            const osc=geo2s(w[wptIdx]),nsc=geo2s(ll);
            const dx=nsc.x-osc.x,dy=nsc.y-osc.y;
            w[wptIdx]={lng:ll.lng,lat:ll.lat};
            const ctrl=r.ctrlPts?r.ctrlPts.map((seg,si)=>{
              const patch={};
              if(si===wptIdx-1){const sc=geo2s({lng:seg.c2lng,lat:seg.c2lat});const g=s2geo({x:sc.x+dx,y:sc.y+dy});patch.c2lng=g.lng;patch.c2lat=g.lat;}
              if(si===wptIdx){const sc=geo2s({lng:seg.c1lng,lat:seg.c1lat});const g=s2geo({x:sc.x+dx,y:sc.y+dy});patch.c1lng=g.lng;patch.c1lat=g.lat;}
              return Object.keys(patch).length?{...seg,...patch}:seg;
            }):null;
            return{...r,wpts:w,ctrlPts:ctrl};
          })}));
        });
      };
      const dragRAll=(e)=>{
        const cur=layerSt.get().routes.find(r=>r.id===selId);if(!cur)return;
        const r0=map.getCanvas().getBoundingClientRect();
        const originLl=map.unproject([e.clientX-r0.left,e.clientY-r0.top]);
        mapDrag(e,ll=>{
          const osc=geo2s(originLl),nsc=geo2s(ll);
          const dx=nsc.x-osc.x,dy=nsc.y-osc.y;
          layerSt.set(s=>({routes:s.routes.map(r=>{
            if(r.id!==selId)return r;
            const nw=(r.wpts||[]).map(w=>{const sc=geo2s(w);return s2geo({x:sc.x+dx,y:sc.y+dy});});
            const nc=r.ctrlPts?r.ctrlPts.map(seg=>{
              const s1=geo2s({lng:seg.c1lng,lat:seg.c1lat}),s2=geo2s({lng:seg.c2lng,lat:seg.c2lat});
              const g1=s2geo({x:s1.x+dx,y:s1.y+dy}),g2=s2geo({x:s2.x+dx,y:s2.y+dy});
              return{...seg,c1lng:g1.lng,c1lat:g1.lat,c2lng:g2.lng,c2lat:g2.lat};
            }):null;
            return{...r,wpts:nw,ctrlPts:nc};
          })}));
        });
      };

      /* ── LABEL drag ── */
      const dragLabel=(id,e)=>{
        mapDrag(e,ll=>{
          labelSt.set(s=>({placed:s.placed.map(x=>x.id===id?{...x,lng:ll.lng,lat:ll.lat}:x)}));
          layerSt.set(s=>({labels:s.labels.map(x=>x.id===id?{...x,lng:ll.lng,lat:ll.lat}:x)}));
        });
      };
      /* ── MARKER drag ── */
      const dragMarker=(id,e)=>{
        mapDrag(e,ll=>{
          markerSt.set(s=>({list:s.list.map(x=>x.id===id?{...x,lng:ll.lng,lat:ll.lat}:x)}));
          layerSt.set(s=>({markers:s.markers.map(x=>x.id===id?{...x,lng:ll.lng,lat:ll.lat}:x)}));
        });
      };

      /* ── reusable bezier handle group ── */
      const PathEditor=({segs,sp,wpts2,ctrlPts,onHandle,onWpt,onAll})=>(
        <g style={{pointerEvents:'all'}}>
          {/* Wide invisible grab strip for move-whole-path */}
          <polyline points={sp.filter(Boolean).map(p=>`${p.x},${p.y}`).join(' ')} fill="none" stroke="transparent" strokeWidth="16" style={{cursor:'move'}} onMouseDown={onAll}/>
          {segs.map((seg,i)=>{
            const p0=sp[i],p1=sp[i+1];
            if(!p0||!p1||!seg||!seg.c1||!seg.c2)return null;
            return(<g key={i}>
              <line x1={p0.x} y1={p0.y} x2={seg.c1.x} y2={seg.c1.y} stroke="rgba(255,255,255,0.45)" strokeWidth="1" strokeDasharray="3 2" pointerEvents="none"/>
              <line x1={p1.x} y1={p1.y} x2={seg.c2.x} y2={seg.c2.y} stroke="rgba(255,255,255,0.45)" strokeWidth="1" strokeDasharray="3 2" pointerEvents="none"/>
              <circle cx={seg.c1.x} cy={seg.c1.y} r="5" fill="#00d4aa" stroke="#000" strokeWidth="1.5" style={{cursor:'crosshair'}} title="Drag to curve · Alt+drag to break" onMouseDown={e=>onHandle(i,'c1',e.altKey,e)}/>
              <circle cx={seg.c2.x} cy={seg.c2.y} r="5" fill="#00d4aa" stroke="#000" strokeWidth="1.5" style={{cursor:'crosshair'}} title="Drag to curve · Alt+drag to break" onMouseDown={e=>onHandle(i,'c2',e.altKey,e)}/>
            </g>);
          })}
          {wpts2.map((w,i)=>{
            const p=sp[i]; if(!p)return null;
            const isEnd=i===0||i===wpts2.length-1;
            const broken=ctrlPts&&(ctrlPts[i-1]?.broken||ctrlPts[i]?.broken);
            return broken
              ? <rect key={i} x={p.x-5} y={p.y-5} width={10} height={10} rx="1" fill={isEnd?'var(--accent)':'#fff'} stroke="#000" strokeWidth="1.5" style={{cursor:'move'}} title="Corner anchor · dbl-click to smooth" onMouseDown={e=>onWpt(i,e)} onDoubleClick={e=>{e.stopPropagation();onWpt(-i-1,e);}}/>
              : <circle key={i} cx={p.x} cy={p.y} r="6" fill={isEnd?'var(--accent)':'#fff'} stroke="#000" strokeWidth="1.5" style={{cursor:'move'}} title="Smooth anchor · dbl-click to corner" onMouseDown={e=>onWpt(i,e)} onDoubleClick={e=>{e.stopPropagation();onWpt(-i-1,e);}}/>;
          })}
        </g>
      );

      return(<svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',overflow:'visible',zIndex:2}}>
        {/* Arrow draft preview */}
        {arrowDraft.length>=2&&arrowDraft.map((pt,i)=>{if(i===0)return null;const p0=project(arrowDraft[i-1].lng,arrowDraft[i-1].lat),p1=project(pt.lng,pt.lat);return(p0&&p1)?<line key={'dl'+i} x1={p0.x} y1={p0.y} x2={p1.x} y2={p1.y} stroke="var(--accent)" strokeWidth="1.5" strokeDasharray="4 3" opacity=".6"/>:null;})}
        {arrowDraft.map((pt,i)=>{const p=project(pt.lng,pt.lat);return p?<circle key={'dd'+i} cx={p.x} cy={p.y} r="5" fill="var(--accent)" opacity=".8" stroke="#000" strokeWidth="1"/>:null;})}
        {/* Selected arrow: bezier editor */}
        {selArrow&&<PathEditor segs={aSegs} sp={aSP} wpts2={aWpts} ctrlPts={selArrow.ctrlPts} onHandle={dragAHandle} onWpt={(idx,e)=>{if(idx<0)breakACorner(-idx-1,e);else dragAWpt(idx,e);}} onAll={dragAAll}/>}
        {/* Selected route: bezier editor */}
        {selRoute&&rSP.length>=2&&<PathEditor segs={rSegs} sp={rSP} wpts2={rWpts} ctrlPts={selRoute.ctrlPts} onHandle={dragRHandle} onWpt={(idx,e)=>{if(idx<0){e.stopPropagation();e.preventDefault();const cur=layerSt.get().routes.find(r=>r.id===selId);if(!cur)return;const realIdx=-idx-1;const w2=cur.wpts||[];const ctrl=cur.ctrlPts?cur.ctrlPts.map(s=>({...s})):mkCtrl(w2);const isNow=!(ctrl[realIdx-1]?.broken||ctrl[realIdx]?.broken);if(realIdx>0)ctrl[realIdx-1]={...ctrl[realIdx-1],broken:isNow};if(realIdx<ctrl.length)ctrl[realIdx]={...ctrl[realIdx],broken:isNow};layerSt.set(s=>({routes:s.routes.map(r=>r.id===selId?{...r,ctrlPts:[...ctrl]}:r)}));}else dragRWpt(idx,e);}} onAll={dragRAll}/>}
        {/* Labels — draggable anchor dots when select tool active */}
        {tool==='select'&&placed.map(inst=>{const p=project(inst.lng,inst.lat);if(!p)return null;return(<circle key={inst.id} cx={p.x} cy={p.y} r="5.5" fill="#4da6ff" stroke="#000" strokeWidth="1.5" opacity=".85" style={{cursor:'move',pointerEvents:'all'}} title="Drag to move label" onMouseDown={e=>dragLabel(inst.id,e)}/>);})}
        {/* Markers — draggable anchor dots when select tool active */}
        {tool==='select'&&layerSt.get().markers.map(m=>{const p=project(m.lng,m.lat);if(!p)return null;return(<circle key={m.id} cx={p.x} cy={p.y} r="5.5" fill="#ff8c42" stroke="#000" strokeWidth="1.5" opacity=".85" style={{cursor:'move',pointerEvents:'all'}} title="Drag to move marker" onMouseDown={e=>dragMarker(m.id,e)}/>);})}
        {/* rotX/rotY 3D perspective overlays for labels */}
        {placed.filter(inst=>(inst.rotX||inst.rotY)&&inst.visible!==false).map(inst=>{
          const p=project(inst.lng,inst.lat);if(!p)return null;
          return(<foreignObject key={'rx'+inst.id} x={p.x-80} y={p.y-24} width={160} height={48} style={{pointerEvents:'none',overflow:'visible'}}>
            <div xmlns="http://www.w3.org/1999/xhtml" style={{perspective:'400px',width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{transform:`rotateX(${inst.rotX||0}deg) rotateY(${inst.rotY||0}deg)`,transformStyle:'preserve-3d',background:'rgba(0,0,0,0.55)',padding:'2px 7px',borderRadius:3,fontSize:Math.max(8,inst.sz||12),color:inst.color||'#fff',whiteSpace:'nowrap',fontFamily:'var(--ff)',opacity:inst.opacity??1,pointerEvents:'none'}}>
                {inst.text||inst.title}
              </div>
            </div>
          </foreignObject>);
        })}
        {/* rotX/rotY 3D perspective overlays for markers */}
        {layerSt.get().markers.filter(m=>(m.rotX||m.rotY)).map(m=>{
          const p=project(m.lng,m.lat);if(!p)return null;
          return(<foreignObject key={'rxm'+m.id} x={p.x-28} y={p.y-28} width={56} height={56} style={{pointerEvents:'none',overflow:'visible'}}>
            <div xmlns="http://www.w3.org/1999/xhtml" style={{perspective:'200px',width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <div style={{transform:`rotateX(${m.rotX||0}deg) rotateY(${m.rotY||0}deg)`,transformStyle:'preserve-3d',fontSize:22,opacity:m.opacity??1,pointerEvents:'none'}}>
                {m.emoji||'📍'}
              </div>
            </div>
          </foreignObject>);
        })}
        {/* Status hints */}
        {wpts.length>0&&<text x="14" y="24" fill="var(--accent)" fontFamily="var(--fm)" fontSize="11">Route: {wpts.length} pt{wpts.length!==1?'s':''} — dbl-click to finish</text>}
        {arrowDraft.length>0&&<text x="14" y={wpts.length>0?40:24} fill="var(--accent)" fontFamily="var(--fm)" fontSize="11">Arrow: {arrowDraft.length} pt{arrowDraft.length!==1?'s':''} — dbl-click to finish</text>}
        {(selArrow||selRoute)&&<text x="14" y={44+(wpts.length>0?16:0)+(arrowDraft.length>0?16:0)} fill="var(--txt3)" fontFamily="var(--fm)" fontSize="10">⬤ teal = curve handles · ⬤ white = anchors · Alt+drag handle = break corner · dbl-click anchor = toggle smooth/corner · drag path = move all</text>}
      </svg>);
    })()}
    {ready&&<div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',pointerEvents:'none',opacity:.2,zIndex:3}}><svg width="20" height="20" viewBox="0 0 20 20"><line x1="10" y1="0" x2="10" y2="7" stroke="var(--accent)" strokeWidth="1"/><line x1="10" y1="13" x2="10" y2="20" stroke="var(--accent)" strokeWidth="1"/><line x1="0" y1="10" x2="7" y2="10" stroke="var(--accent)" strokeWidth="1"/><line x1="13" y1="10" x2="20" y2="10" stroke="var(--accent)" strokeWidth="1"/></svg></div>}
    {ready&&<div style={getGlobeOverlayCss(globeEnabled,globeAtmosphereEnabled,globeAtmosphereStyle,cam)}/>} 
    {ready&&stageLookEnabled&&<StageLookDevFloatingPanel/>}
    {ready&&<CamHUD/>}
    {ready&&minimapEnabled&&<div style={{position:'absolute',left:(minimapBox?.x??12),top:(minimapBox?.y??12),width:(minimapBox?.w||220),height:(minimapBox?.h||140),zIndex:5,background:'rgba(9,12,18,.78)',border:'1px solid var(--border-hi)',borderRadius:10,overflow:'hidden',boxShadow:'0 10px 28px rgba(0,0,0,.45)'}}>
      <div onMouseDown={startMiniDrag} style={{height:24,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 8px',background:'rgba(0,0,0,.32)',borderBottom:'1px solid rgba(255,255,255,.08)',cursor:'move',userSelect:'none'}}>
        <div style={{padding:'2px 6px',borderRadius:999,background:'rgba(0,0,0,.35)',color:'var(--txt)',fontFamily:'var(--fm)',fontSize:9,letterSpacing:'.08em'}}>MINIMAP</div>
        <div style={{fontSize:10,color:'var(--txt3)',fontFamily:'var(--fm)'}}>drag</div>
      </div>
      <div ref={miniRef} style={{width:'100%',height:'calc(100% - 24px)'}}/>
      <div onMouseDown={startMiniResize} style={{position:'absolute',right:0,bottom:0,width:18,height:18,cursor:'nwse-resize',background:'linear-gradient(135deg, transparent 0 45%, rgba(255,255,255,.35) 45% 55%, transparent 55% 100%)'}}/>
    </div>}

function CamPanel(){const c=useStore(mapSt,s=>s.cam);const globeEnabled=useStore(mapSt,s=>s.globeEnabled);const globeSpinEnabled=useStore(mapSt,s=>s.globeSpinEnabled);
  const set=(k,v)=>{

        <SelectInput label="LOD" value={google3dLod} onChange={v=>mapSt.set({google3dLod:v})} options={GOOGLE_3D_LOD_OPTIONS} lw={44}/>
        <ToggleSwitch on={google3dAutoSync} onToggle={()=>mapSt.set(s=>({google3dAutoSync:!s.google3dAutoSync}))} label="Auto-sync camera from MapLibre"/>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <button onClick={()=>{ const hasGc=!!mapSt.get().google3dCam; mapSt.set(s=>({google3dEnabled:true, globeEnabled:false})); if(!hasGc){ setTimeout(()=>{ const host=window.__mdGoogle3DSync||null; if(host) host({fly:true}); },50); } }} style={{padding:'7px 8px',background:'var(--bg-base)',border:'1px solid var(--border)',borderRadius:6,color:'var(--txt2)',fontSize:10,cursor:'pointer'}}>Open Google 3D</button>
          <button onClick={()=>{ const host=window.__mdGoogle3DSync||null; if(host) host(); }} style={{padding:'7px 8px',background:'var(--bg-base)',border:'1px solid var(--border)',borderRadius:6,color:'var(--txt2)',fontSize:10,cursor:'pointer'}}>Match from MapLibre</button>
          <button onClick={()=>{ const pull=window.__mdGoogle3DPullToMap||null; if(pull) pull(); }} style={{padding:'7px 8px',background:'var(--bg-base)',border:'1px solid var(--border)',borderRadius:6,color:'var(--txt2)',fontSize:10,cursor:'pointer'}}>Pull framing to MapLibre</button>
          <button onClick={()=>mapSt.set({google3dEnabled:false})} style={{padding:'7px 8px',background:'var(--bg-base)',border:'1px solid var(--border)',borderRadius:6,color:'var(--txt2)',fontSize:10,cursor:'pointer'}}>Hide Google 3D</button>
        </div>
        <div style={{fontSize:10,color:'var(--txt3)'}}>Status: {google3dStatus}{google3dError?` · ${google3dError}`:''}</div>
        <div style={{fontSize:10,color:'var(--txt4)',lineHeight:1.45}}>Uses CesiumJS with Google Photorealistic 3D Tiles. Treat this as a separate shot camera: match from MapLibre, adjust in 3D, then pull framing back when needed.</div>
      </div>
      <Slider label="TERRAIN" value={terrainExaggeration} onChange={v=>mapSt.set({terrainExaggeration:v})} min={1} max={2} step={0.05} unit="×"/>
    </div>
  </div>);
}

      else if(src.loader==='reactors')geojson=await fetchReactorsGlobal();

      else if(src.loader==='piracy')geojson=await fetchPiracyHotspots();

      else if(src.loader==='naval')geojson=await fetchCurrentViewMilitary('naval');

        <div style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--txt3)',letterSpacing:'.08em'}}>LIVE TRAFFIC</div>

          <input value={live.flightsPollMs} onChange={e=>liveTrafficSt.set({flightsPollMs:Math.max(5000,parseInt(e.target.value||'15000',10)||15000)})} style={{width:'100%',padding:'4px 6px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--txt)',fontSize:10}} title="poll ms" />
        </div>
        <div style={{height:1,background:'var(--border)'}}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:8,alignItems:'center'}}>
          <div>
            <div style={{fontSize:11,color:'var(--txt)',fontWeight:600}}>Ships · Proxy Feed</div>
            <div style={{fontSize:9,color:'var(--txt3)',fontFamily:'var(--fm)'}}>{live.shipsStatus}{live.shipsCount?` · ${live.shipsCount} tracks`:''}{live.shipsLastAt?` · ${live.shipsLastAt}`:''}</div>
          </div>

        <input value={live.shipsUrl} onChange={e=>liveTrafficSt.set({shipsUrl:e.target.value})} placeholder="Ship feed URL · use Local HTTP / Local WS to fill from backend base" style={{width:'100%',padding:'6px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--txt)',fontSize:10}} />
        <div style={{display:'grid',gridTemplateColumns:'1fr auto',gap:8,alignItems:'center'}}>
          <input value={live.shipsApiKey||''} onChange={e=>liveTrafficSt.set({shipsApiKey:e.target.value})} placeholder="AISSTREAM_API_KEY" style={{width:'100%',padding:'6px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--txt)',fontSize:10,fontFamily:'var(--fm)'}} />
          <Btn sz="xs" v="ghost" onClick={()=>liveTrafficSt.set({shipsApiKey:''})}>Clear</Btn>
        </div>
        <div style={{fontSize:9,color:'var(--txt3)',lineHeight:'13px'}}>Optional runtime key for the AIS relay. This app appends it to the ship feed URL as <span style={{fontFamily:'var(--fm)'}}>aisstream_api_key</span> so you can paste a key here even when the backend was started without one.</div>

          <input value={live.shipsPollMs} onChange={e=>liveTrafficSt.set({shipsPollMs:Math.max(5000,parseInt(e.target.value||'15000',10)||15000)})} style={{width:'100%',padding:'4px 6px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--txt)',fontSize:10}} title="poll ms" />

        <div style={{display:'flex',flexDirection:'column',gap:5}}>

            <div style={{display:'flex',alignItems:'center',gap:8}}>

function BorderPanel(){
  const[cat,setCat]=useState('countries');const[loading,setLoading]=useState(false);const[error,setError]=useState('');
  const[osmQuery,setOsmQuery]=useState('');const[filterText,setFilterText]=useState('');
  const[loadedData,setLoadedData]=useState(null);const[featureNames,setFeatureNames]=useState([]);const[osmResults,setOsmResults]=useState([]);

  const activeCat=BORDER_CATEGORIES.find(c=>c.id===cat);
  const featureName=f=>f?.properties?.NAME||f?.properties?.name||f?.properties?.ADMIN||f?.properties?.admin||f?.properties?.NAME_EN||f?.properties?.wof_name||'Unknown';
  const bboxToFeature=(bb,name='Search Area')=>{
    if(!Array.isArray(bb)||bb.length<4)return null;
    const s=Number(bb[0]),n=Number(bb[1]),w=Number(bb[2]),e=Number(bb[3]);
    if(![s,n,w,e].every(Number.isFinite))return null;
    return {type:'Feature',geometry:{type:'Polygon',coordinates:[[[w,s],[e,s],[e,n],[w,n],[w,s]]]},properties:{name,_fallbackBBox:true}};
  };
  const addBorderAndFly=(title,geojson,stylePatch={})=>{
    if(!geojson?.features?.length)return;
    const bl={id:uid(),title,visible:true,geojson,style:{color:'#b47aff',width:2,opacity:0.8,dash:'solid',fill:'#b47aff',fillOp:0.08,...stylePatch}};
    layerSt.set(s=>({borders:[...s.borders,bl]}));
    const coords=[];
    geojson.features.forEach(f=>{
      const g=f.geometry;
      const walk=(c)=>{if(!c)return; if(typeof c[0]==='number')coords.push(c); else c.forEach(walk);};
      walk(g?.coordinates);
    });
    if(coords.length){
      let minLng=180,maxLng=-180,minLat=90,maxLat=-90;
      coords.forEach(([lng,lat])=>{minLng=Math.min(minLng,lng);maxLng=Math.max(maxLng,lng);minLat=Math.min(minLat,lat);maxLat=Math.max(maxLat,lat);});
      mapSt.set(s=>({cam:{...s.cam,lat:(minLat+maxLat)/2,lng:(minLng+maxLng)/2,zoom:Math.max(3, Math.min(8, Math.abs(maxLng-minLng)>40||Math.abs(maxLat-minLat)>25 ? 4 : 6))}}));
    }
  };

  const fetchDataset=async(src)=>{
    setLoading(true);setError('');
    try{
      const res=await fetch(src.url);if(!res.ok)throw new Error('Failed to fetch');
      const geo=await res.json();
      // Extract feature names for filtering
      const names=(geo.features||[]).map(featureName);
      setFeatureNames([...new Set(names)].sort());
      setLoadedData({geo,src});
    }catch(err){setError(err.message);}
    setLoading(false);
  };

  const addFeature=(name)=>{
    if(!loadedData)return;
    const filtered={type:'FeatureCollection',features:loadedData.geo.features.filter(f=>featureName(f)===name)};
    if(!filtered.features.length)return;
    addBorderAndFly(name,filtered);
  };

  const addAll=()=>{
    if(!loadedData)return;
    addBorderAndFly(`All ${activeCat?.label||'features'}`,loadedData.geo,{width:1.5,opacity:0.7,fillOp:0.04});
  };

  const addOSMResult=(item)=>{
    const shortName=(item.display_name||item.name||osmQuery||'Result').split(',')[0];
    const feat=item.geojson
      ? {type:'Feature',geometry:item.geojson,properties:{name:shortName,display_name:item.display_name||'',class:item.class||'',type:item.type||'',source:'Nominatim / OSM'}}
      : bboxToFeature(item.boundingbox, shortName);
    if(!feat){setError('No polygon or bounding box available for this result');return;}
    addBorderAndFly(shortName,{type:'FeatureCollection',features:[feat]}, item.geojson?{}:{dash:'dash',fillOp:0.03,width:1.5});
  };

  const fetchOSM=async()=>{
    if(!osmQuery.trim())return;setLoading(true);setError('');setOsmResults([]);
    try{
      const base=`https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&polygon_geojson=1&limit=8&q=${encodeURIComponent(osmQuery)}`;
      let data=[];
      try{const r=await fetch(base,{headers:{'Accept':'application/json'}}); if(r.ok) data=await r.json();}catch{}
      if((!data||!data.length) && !/lake|river|sea|ocean|water|reservoir|state|province|county|city/i.test(osmQuery)){
        const q2=[`${osmQuery} state`,`${osmQuery} city`,`${osmQuery} lake`,`${osmQuery} river`];
        for(const q of q2){
          try{const r=await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&polygon_geojson=1&limit=4&q=${encodeURIComponent(q)}`,{headers:{'Accept':'application/json'}}); if(r.ok){data=await r.json(); if(data?.length) break;}}catch{}
        }
      }
      if(!data||!data.length){setError('No results found');setLoading(false);return;}
      const cleaned=data.map(item=>({
        ...item,
        _short:(item.display_name||item.name||'').split(',')[0],
        _hasGeometry:!!item.geojson,
        _hasBBox:Array.isArray(item.boundingbox)&&item.boundingbox.length>=4
      })).filter(item=>item._hasGeometry||item._hasBBox);
      setOsmResults(cleaned);
      if(!cleaned.length){setError('Results found, but none included a polygon or bounding box');}
      else if(cleaned.length===1){addOSMResult(cleaned[0]);}
    }catch(err){setError(err.message);}
    setLoading(false);
  };

  const filteredNames=filterText?featureNames.filter(n=>n.toLowerCase().includes(filterText.toLowerCase())):featureNames;

  return(<div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <PH title="BORDERS & FEATURES" sub={layerSt.get().borders.length}/>
    {/* Category tabs */}
    <div style={{display:'flex',flexWrap:'wrap',gap:3,padding:'8px 10px',borderBottom:'1px solid var(--border)'}}>
      {BORDER_CATEGORIES.map(c=>(<button key={c.id} onClick={()=>{setCat(c.id);setLoadedData(null);setFeatureNames([]);setFilterText('');setOsmResults([]);setError('');}}
        style={{padding:'3px 8px',background:cat===c.id?'var(--purple)':'var(--bg-elevated)',
          border:`1px solid ${cat===c.id?'var(--purple)':'var(--border)'}`,borderRadius:12,
          color:cat===c.id?'#fff':'var(--txt3)',fontSize:9,fontFamily:'var(--fm)',cursor:'pointer',transition:'all .1s'}}>
        {c.label}
      </button>))}
    </div>

    <div style={{flex:1,overflow:'auto',padding:'8px 10px'}}>
      <div style={{fontSize:10,color:'var(--txt3)',marginBottom:8,lineHeight:'14px'}}>{activeCat?.desc}</div>

      {cat==='osm-search'?(
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <div style={{fontSize:10,color:'var(--txt2)',lineHeight:'14px'}}>Smart search for countries, states, cities, lakes, seas, rivers, islands, and other administrative boundaries. The pipeline now keeps multiple OSM candidates and falls back to a bounding-box polygon when OSM has no full geometry.</div>
          <div style={{display:'flex',gap:6}}>
            <input value={osmQuery} onChange={e=>setOsmQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&fetchOSM()}
              placeholder="e.g. France, Tokyo, California…" style={{flex:1,background:'var(--bg-base)',border:'1px solid var(--border-hi)',borderRadius:4,padding:'7px 10px',color:'var(--txt)',fontFamily:'var(--ff)',fontSize:12,outline:'none'}}/>
            <Btn v="accent" sz="sm" onClick={fetchOSM} disabled={loading||!osmQuery.trim()}>
              {loading?<div style={{width:11,height:11,border:'2px solid rgba(0,0,0,.3)',borderTopColor:'#000',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>:<><Ic n="globe" s={12}/>Fetch</>}
            </Btn>
          </div>
          {error&&<div style={{fontSize:10,color:'var(--red)',fontFamily:'var(--fm)'}}>{error}</div>}
          {osmResults.length>0&&<div style={{display:'flex',flexDirection:'column',gap:4,padding:'7px 8px',border:'1px solid var(--border)',borderRadius:4,background:'var(--bg-elevated)'}}>
            <div style={{fontSize:9,color:'var(--txt3)',fontFamily:'var(--fm)'}}>{osmResults.length} live result{osmResults.length!==1?'s':''} — add the one you want</div>
            <div style={{maxHeight:180,overflow:'auto',display:'flex',flexDirection:'column',gap:4}}>
              {osmResults.map((item,idx)=>(<div key={`${item.osm_type||'x'}-${item.osm_id||idx}`} style={{display:'flex',gap:6,alignItems:'flex-start',padding:'5px 6px',border:'1px solid var(--border)',borderRadius:4}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,color:'var(--txt)',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item._short||'Result'}</div>
                  <div style={{fontSize:9,color:'var(--txt3)',fontFamily:'var(--fm)',lineHeight:'13px'}}>{item.type||item.class||'feature'} · {item._hasGeometry?'polygon':'bbox fallback'}</div>
                  <div style={{fontSize:9,color:'var(--txt3)',lineHeight:'13px'}}>{item.display_name}</div>
                </div>
                <Btn sz="xs" v="solid" onClick={()=>addOSMResult(item)}><Ic n="plus" s={10}/>Add</Btn>
              </div>))}
            </div>
          </div>}
          <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
            {['France','Germany','Japan','Brazil','United States','California','Texas','New York','United Kingdom','Australia','India','China','Russia','Italy','South Korea','Indonesia','Nigeria','Egypt','Mexico','Thailand'].map(q=>(<button key={q} onClick={()=>setOsmQuery(q)}
              style={{padding:'2px 6px',background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:3,color:'var(--txt3)',fontSize:8,fontFamily:'var(--fm)',cursor:'pointer'}}>{q}</button>))}
          </div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          {/* Source selection */}
          <div style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--txt3)',letterSpacing:'.08em'}}>DATA SOURCE</div>
          {activeCat?.sources.map(src=>(<button key={src.id} onClick={()=>fetchDataset(src)}
            style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',width:'100%',
              background:loadedData?.src?.id===src.id?'rgba(180,122,255,.15)':'var(--bg-elevated)',
              border:`1px solid ${loadedData?.src?.id===src.id?'var(--purple)':'var(--border)'}`,borderRadius:'var(--r)',cursor:'pointer',color:loadedData?.src?.id===src.id?'var(--purple)':'var(--txt2)',fontFamily:'var(--ff)',fontSize:11,textAlign:'left'}}>
            <Ic n="db" s={11} c={loadedData?.src?.id===src.id?'var(--purple)':'var(--txt3)'}/>
            <span style={{flex:1}}>{src.label}</span>
            <Tag c="var(--txt3)">{src.detail}</Tag>
          </button>))}
          {loading&&<div style={{display:'flex',alignItems:'center',gap:6,padding:8}}><div style={{width:12,height:12,border:'2px solid var(--purple)',borderTopColor:'transparent',borderRadius:'50%',animation:'spin .7s linear infinite'}}/><span style={{fontSize:10,color:'var(--purple)',fontFamily:'var(--fm)'}}>Loading dataset…</span></div>}
          {error&&<div style={{fontSize:10,color:'var(--red)',fontFamily:'var(--fm)'}}>{error}</div>}

          {/* Feature list */}
          {loadedData&&featureNames.length>0&&(<>
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              <input value={filterText} onChange={e=>setFilterText(e.target.value)} placeholder="Filter features…"
                style={{flex:1,background:'var(--bg-base)',border:'1px solid var(--border)',borderRadius:3,padding:'5px 8px',color:'var(--txt)',fontFamily:'var(--fm)',fontSize:11,outline:'none'}}/>
              <Btn sz="xs" v="solid" onClick={addAll} title="Add entire dataset"><Ic n="plus" s={10}/>All</Btn>
            </div>
            <div style={{fontSize:9,color:'var(--txt3)',fontFamily:'var(--fm)'}}>{filteredNames.length} features found — click to add</div>
            <div style={{maxHeight:200,overflow:'auto',border:'1px solid var(--border)',borderRadius:3}}>
              {filteredNames.slice(0,100).map(name=>(<button key={name} onClick={()=>addFeature(name)}
                style={{display:'block',width:'100%',padding:'4px 8px',background:'transparent',border:'none',
                  borderBottom:'1px solid var(--border)',color:'var(--txt2)',fontSize:11,fontFamily:'var(--ff)',
                  cursor:'pointer',textAlign:'left',transition:'background .1s'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--bg-hover)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                {name}
              </button>))}
              {filteredNames.length>100&&<div style={{padding:6,fontSize:9,color:'var(--txt3)',textAlign:'center'}}>…and {filteredNames.length-100} more (filter to narrow)</div>}
            </div>
          </>)}
        </div>
      )}
    </div>
  </div>);
}
