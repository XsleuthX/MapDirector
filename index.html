function ImageOverlayPanel(){
  const overlays=useStore(imgOverlaySt,s=>s.list);
  const fileRef=useRef(null);
  const[selId,setSelId]=useState(null);
  const upd=(id,p)=>imgOverlaySt.set(s=>({list:s.list.map(o=>o.id===id?{...o,...p}:o)}));

  // Drag anchor to move overlay position on map
  const dragAnchor=(id,e)=>{
    e.stopPropagation();e.preventDefault();
    const map=globalMapRef.current;if(!map)return;
    const startX=e.clientX,startY=e.clientY;
    const ov=imgOverlaySt.get().list.find(o=>o.id===id);if(!ov)return;
    const startLng=ov.lng,startLat=ov.lat;
    const onMove=ev=>{
      const dx=ev.clientX-startX,dy=ev.clientY-startY;
      const canvas=map.getCanvas();
      const cw=canvas.offsetWidth,ch=canvas.offsetHeight;
      const dLng=dx/cw*360/Math.pow(2,map.getZoom()-1);
      const dLat=-dy/ch*170/Math.pow(2,map.getZoom()-1);
      upd(id,{lng:startLng+dLng,lat:startLat+dLat});
    };
    const onUp=()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
    window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  };

  const importImg=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const dataUrl=ev.target.result;
      const img=new Image();
      img.onload=()=>{
        const aspect=img.width/img.height;
        const widthM=500000;
        const ov={id:uid(),title:f.name.replace(/\.[^.]+$/,''),visible:true,dataUrl,
          lat:mapSt.get().cam.lat,lng:mapSt.get().cam.lng,
          widthM,heightM:Math.round(widthM/aspect),
          scaleX:1,scaleY:1,flipX:false,flipY:false,
          rotZ:0,opacity:1,aspect};
        imgOverlaySt.set(s=>({list:[...s.list,ov]}));
        setSelId(ov.id);
      };
      img.src=dataUrl;
    };
    reader.readAsDataURL(f);
    e.target.value='';
  };
  const sel=overlays.find(o=>o.id===selId);
  return(<div style={{display:'flex',flexDirection:'column',borderBottom:'1px solid var(--border)'}}>
    <PH title="IMAGE OVERLAYS" sub={overlays.length} action={<Btn sz="xs" v="solid" onClick={()=>fileRef.current?.click()} title="Import image"><Ic n="plus" s={10}/>Import</Btn>}/>
    <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={importImg}/>
    {overlays.map(ov=>(
      <div key={ov.id} style={{borderBottom:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:6,padding:'5px 10px'}}>
          <div style={{width:22,height:22,borderRadius:2,background:'var(--bg-elevated)',border:'1px solid var(--border)',overflow:'hidden',flexShrink:0,cursor:'move'}}
               onMouseDown={e=>dragAnchor(ov.id,e)} title="Drag to move overlay on map">
            <img src={ov.dataUrl} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
          </div>
          <span style={{flex:1,fontSize:12,color:'var(--txt)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ov.title}</span>
          <Btn sz="xs" v="ghost" on={selId===ov.id} onClick={()=>setSelId(selId===ov.id?null:ov.id)}><Ic n="gear" s={10}/></Btn>
          <Btn sz="xs" v="ghost" onClick={()=>imgOverlaySt.set(s=>({list:s.list.filter(o=>o.id!==ov.id)}))}><Ic n="x" s={10} c="var(--red)"/></Btn>
        </div>
        {selId===ov.id&&sel&&<div style={{padding:'8px 10px 10px',background:'var(--bg-base)',display:'flex',flexDirection:'column',gap:7}}>
          <div style={{fontSize:11,color:'var(--txt3)',fontFamily:'var(--fm)',marginBottom:2}}>↖ Drag the thumbnail above to move. Or enter coordinates:</div>
          <NI label="LAT" value={sel.lat} onChange={v=>upd(sel.id,{lat:v})} min={-90} max={90} step={0.001}/>
          <NI label="LNG" value={sel.lng} onChange={v=>upd(sel.id,{lng:v})} min={-180} max={180} step={0.001}/>
          <div style={{borderTop:'1px solid var(--border)',paddingTop:6}}>
            <div style={{fontSize:11,color:'var(--txt2)',fontFamily:'var(--fm)',marginBottom:5,fontWeight:600}}>SIZE</div>
            <div style={{display:'flex',flexDirection:'column',gap:5}}>
              <NI label="W (km)" value={Math.round((sel.widthM||500000)/1000)} onChange={v=>upd(sel.id,{widthM:v*1000})} min={1} max={20000} step={10}/>
              <NI label="H (km)" value={Math.round((sel.heightM||500000)/1000)} onChange={v=>upd(sel.id,{heightM:v*1000})} min={1} max={20000} step={10}/>
              <NI label="Scale X" value={sel.scaleX??1} onChange={v=>upd(sel.id,{scaleX:v})} min={0.01} max={10} step={0.01}/>
              <NI label="Scale Y" value={sel.scaleY??1} onChange={v=>upd(sel.id,{scaleY:v})} min={0.01} max={10} step={0.01}/>
            </div>
          </div>
          <div style={{borderTop:'1px solid var(--border)',paddingTop:6}}>
            <div style={{fontSize:11,color:'var(--txt2)',fontFamily:'var(--fm)',marginBottom:5,fontWeight:600}}>TRANSFORM</div>
            <NI label="ROT Z °" value={sel.rotZ||0} onChange={v=>upd(sel.id,{rotZ:v})} min={-180} max={180} step={0.5}/>
            <div style={{display:'flex',gap:5,marginTop:6}}>
              <button onClick={()=>upd(sel.id,{flipX:!sel.flipX})}
                style={{flex:1,padding:'5px 0',background:sel.flipX?'var(--accent-dim)':'var(--bg-elevated)',border:`1px solid ${sel.flipX?'var(--accent-bdr)':'var(--border)'}`,borderRadius:3,color:sel.flipX?'var(--accent)':'var(--txt2)',fontSize:11,fontFamily:'var(--fm)',cursor:'pointer'}}>
                ↔ Flip X
              </button>
              <button onClick={()=>upd(sel.id,{flipY:!sel.flipY})}
                style={{flex:1,padding:'5px 0',background:sel.flipY?'var(--accent-dim)':'var(--bg-elevated)',border:`1px solid ${sel.flipY?'var(--accent-bdr)':'var(--border)'}`,borderRadius:3,color:sel.flipY?'var(--accent)':'var(--txt2)',fontSize:11,fontFamily:'var(--fm)',cursor:'pointer'}}>
                ↕ Flip Y
              </button>
            </div>
          </div>
          <Slider label="OPAC" value={sel.opacity??1} onChange={v=>upd(sel.id,{opacity:v})} min={0} max={1} step={0.01}/>
          <div style={{display:'flex',gap:5}}>
            <ToggleSwitch on={sel.visible} onToggle={()=>upd(sel.id,{visible:!sel.visible})} label="Visible"/>
            <Btn sz="xs" v="solid" onClick={()=>mapSt.set(s=>({cam:{...s.cam,lat:sel.lat,lng:sel.lng}}))}>↗ Fly to</Btn>
          </div>
        </div>}
      </div>
    ))}
  </div>);
}

// ── Moved outside MapCanvas so LayerStylePanel (also depth-0) can access it ──
const FEATURE_ICON_KINDS=['generic','flight','port','reactor','piracy','airport','volcano','military'];
const featureIconKindsForUI=()=>FEATURE_ICON_KINDS;

function LayersPanel(){
  const st=useStore(layerSt);
  const mapState=useStore(mapSt);
  const{feat,routes,arrows,borders,labels,markers,selId}=st;
  const fileRef=useRef(null);
  const dragIdRef=useRef(null);
  const [histYear,setHistYear]=useState('1914');
  const [histLoading,setHistLoading]=useState(false);
  const [,forcePanelTick]=useReducer(n=>n+1,0);
  useEffect(()=>{
    let raf=0;
    const ping=()=>{ if(raf) return; raf=requestAnimationFrame(()=>{ raf=0; forcePanelTick(); }); };
    const unsubA=layerSt.sub(ping);
    const unsubB=mapSt.sub(ping);
    return ()=>{ if(raf) cancelAnimationFrame(raf); unsubA(); unsubB(); };
  },[]);
  const allItems=orderedVisualItems(st,mapState).slice().sort((a,b)=>a._t==='stagebg'?1:b._t==='stagebg'?-1:0);
  useEffect(()=>{
    const next=ensureLayerOrder(st).filter(id=>!String(id).startsWith('bm-'));
    if(JSON.stringify(next)!==JSON.stringify((st.layerOrder||[]).filter(id=>!String(id).startsWith('bm-')))) layerSt.set({layerOrder:next});
  },[feat.length,routes.length,arrows.length,borders.length,labels.length,markers.length]);
  useEffect(()=>{
    const stack=mapState.basemapStack||[];
    if(stack.length){
      const bottom=[...orderedVisualItems(layerSt.get(), mapState)].filter(x=>x._t==='basemap').slice(-1)[0] || stack[stack.length-1];
      if(bottom && bottom.basemapId && mapState.basemap!==bottom.basemapId) mapSt.set({basemap:bottom.basemapId});
    }
  },[JSON.stringify((mapState.basemapStack||[]).map(x=>x.id+':'+x.basemapId+':'+x.visible+':'+x.opacity)), JSON.stringify(layerSt.get().layerOrder||[])]);
  const importFile=async(e)=>{const f=e.target.files[0];if(!f)return;try{const geo=JSON.parse(await f.text());const item={id:uid(),title:f.name.replace(/\.[^.]+$/,''),visible:true,geojson:geo,style:{fill:'#4da6ff',line:'#4da6ff',lw:2,fillOp:.3,cr:6},opacity:1};layerSt.set(s=>({feat:[...s.feat,item],layerOrder:[item.id,...ensureLayerOrder(s)]}));}catch{alert('Could not parse GeoJSON');}e.target.value='';};
  const ensureTrack=(id,title)=>{if(globalMapRef.addLayerTrack)globalMapRef.addLayerTrack(id,title);};
  const del=(type,id)=>{
    if(type==='basemap'){
      mapSt.set(s=>{
        const next=(s.basemapStack||[]).filter(l=>l.id!==id);
        const fallback=next.length?next[next.length-1].basemapId:'osm-raster';
        return {basemapStack:next.length?next:[makeBasemapLayer('osm-raster')],basemap:fallback};
      });
      layerSt.set(s=>({layerOrder:(s.layerOrder||[]).filter(x=>x!==id),selId:s.selId===id?null:s.selId}));
      return;
    }
    if(type==='labels'){layerSt.set(s=>({labels:s.labels.filter(l=>l.id!==id),layerOrder:(s.layerOrder||[]).filter(x=>x!==id),selId:s.selId===id?null:s.selId}));labelSt.set(s=>({placed:s.placed.filter(x=>x.id!==id)}));return;}
    if(type==='markers'){layerSt.set(s=>({markers:s.markers.filter(l=>l.id!==id),layerOrder:(s.layerOrder||[]).filter(x=>x!==id),selId:s.selId===id?null:s.selId}));markerSt.set(s=>({list:s.list.filter(x=>x.id!==id)}));return;}
    layerSt.set(s=>({[type]:s[type].filter(l=>l.id!==id),layerOrder:(s.layerOrder||[]).filter(x=>x!==id),selId:s.selId===id?null:s.selId}));
  };
  const togVis=(type,id)=>{
    if(type==='stagebg'){
      mapSt.set(s=>({stageBgVisible:!(s.stageBgVisible!==false)}));
      try{ globalMapRef.current?.triggerRepaint?.(); }catch{}
      return;
    }
    if(type==='basemap'){mapSt.set(s=>({basemapStack:(s.basemapStack||[]).map(l=>l.id===id?{...l,visible:!l.visible}:l)}));return;}
    if(type==='labels'){layerSt.set(s=>({labels:s.labels.map(l=>l.id===id?{...l,visible:!l.visible}:l)}));labelSt.set(s=>({placed:s.placed.map(x=>x.id===id?{...x,visible:!x.visible}:x)}));return;}
    if(type==='markers'){layerSt.set(s=>({markers:s.markers.map(l=>l.id===id?{...l,visible:!l.visible}:l)}));markerSt.set(s=>({list:s.list.map(x=>x.id===id?{...x,visible:!(x.visible!==false)}:x)}));return;}
    layerSt.set(s=>({[type]:s[type].map(l=>l.id===id?{...l,visible:!l.visible}:l)}));
  };
  const moveItem=(dragId, dropId)=>{
    if(!dragId||!dropId||dragId===dropId||dragId==='stage-bg-layer'||dropId==='stage-bg-layer') return;
    const current=ensureVisualOrder(layerSt.get(), mapSt.get()).filter(id=>id!==dragId);
    const idx=current.indexOf(dropId);
    if(idx===-1) return;
    current.splice(idx,0,dragId);
    syncVisualOrder(current, layerSt.get(), mapSt.get());
  };
  const loadHistorical=async(mode='exact')=>{
    const y=Number(histYear);
    if(!Number.isFinite(y)) return alert('Enter a valid year');
    setHistLoading(true);
    try{
      if(mode==='places') await HistoricalBasemapsLoader.addPlacesLayer({year:y,replaceExisting:false,fit:true});
      else if(mode==='nearest') await HistoricalBasemapsLoader.addClosestYearLayer(y,{replaceExisting:true,fit:true});
      else await HistoricalBasemapsLoader.addYearLayer(y,{replaceExisting:true,fit:true});
    }catch(err){alert('Historical basemap load failed: '+err.message);}
    finally{setHistLoading(false);}
  };

  return(<div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
    <ImageOverlayPanel/>
    <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)',display:'flex',flexDirection:'column',gap:6,background:'var(--bg-base)'}}>
      <div style={{fontSize:9,color:'var(--txt3)',fontFamily:'var(--fm)',letterSpacing:'.08em'}}>IMPORT HISTORICAL MAPS</div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <input value={histYear} onChange={e=>setHistYear(e.target.value.replace(/[^0-9\-]/g,''))} placeholder="Year" style={{flex:1,minWidth:0,background:'var(--bg-elevated)',border:'1px solid var(--border)',borderRadius:4,padding:'5px 8px',color:'var(--txt)',fontSize:11,outline:'none',fontFamily:'var(--ff)'}}/>
        <Btn sz="xs" v="solid" onClick={()=>loadHistorical('exact')} disabled={histLoading}>{histLoading?'…':'Load'}</Btn>
        <Btn sz="xs" v="ghost" onClick={()=>loadHistorical('nearest')} disabled={histLoading}>Nearest</Btn>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
        <Btn sz="xs" v="ghost" onClick={()=>loadHistorical('places')} disabled={histLoading}>Places</Btn>
        <Btn sz="xs" v="ghost" onClick={()=>HistoricalBasemapsLoader.removeHistoricalLayers()} disabled={histLoading}>Clear Historical</Btn>
        <span style={{fontSize:9,color:'var(--txt3)',fontFamily:'var(--fm)'}}>Loads into normal feature layers.</span>
      </div>
    </div>
    <PH title="LAYERS" sub={allItems.length} action={<div style={{display:'flex',gap:3}}><Btn sz="xs" v="ghost" title="Import GeoJSON" onClick={()=>fileRef.current?.click()}><Ic n="import" s={10}/></Btn><Btn sz="xs" v="ghost" title="New layer" onClick={()=>{const item={id:uid(),title:'New Layer',visible:true,geojson:{type:'FeatureCollection',features:[]},style:{fill:'#4da6ff',line:'#4da6ff',lw:2,fillOp:.3,cr:6},opacity:1};layerSt.set(s=>({feat:[...s.feat,item],layerOrder:[item.id,...ensureLayerOrder(s)]}));}}><Ic n="plus" s={10}/></Btn></div>}/>
    <input type="file" ref={fileRef} accept=".geojson,.json" style={{display:'none'}} onChange={importFile}/>
    <div style={{padding:'6px 10px',borderBottom:'1px solid var(--border)',fontSize:9,color:'var(--txt3)',fontFamily:'var(--fm)'}}>Top item = top layer in viewport. Stage Background is pinned as the bottom studio layer. Drag rows to reorder the rest.</div>
    <div style={{flex:1,overflow:'auto'}}>
      {allItems.length===0&&<div style={{padding:'20px 14px',textAlign:'center',fontSize:11,color:'var(--txt3)'}}>No layers yet — press R for route, A for arrow</div>}
      {allItems.map(l=>(<div key={l.id} draggable={l._t!=='stagebg'} onDragStart={()=>{dragIdRef.current=l.id;}} onDragOver={e=>e.preventDefault()} onDrop={()=>moveItem(dragIdRef.current,l.id)} onClick={()=>layerSt.set({selId:l.id})} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',cursor:'pointer',background:selId===l.id?'var(--bg-active)':'transparent',borderBottom:'1px solid var(--border)'}}>
        <Ic n="grip" s={12} c="var(--txt3)"/>
        <Ic n={l._ic} s={12} c={l._c||'var(--txt3)'}/>
        <span style={{flex:1,fontSize:11,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:selId===l.id?'var(--txt)':'var(--txt2)'}}>{l.title}</span>
        <Tag c="var(--txt3)">{l._t==='basemap'?((BASEMAPS.find(b=>b.id===l.basemapId)||{}).isRaster?'raster':'vector'):l._t==='feat'&&l.meta?.overlay?'overlay':l._t}</Tag>
        {l._t!=='stagebg'&&<button onClick={e=>{e.stopPropagation();ensureTrack(l.id,l.title);}} title="Add timeline layer block" style={{background:'none',border:'none',cursor:'pointer',color:'var(--cyan)',fontSize:11,padding:'0 2px',lineHeight:1}} onMouseEnter={e=>e.currentTarget.style.color='var(--accent)'} onMouseLeave={e=>e.currentTarget.style.color='var(--cyan)'}>▭</button>}
        <Btn sz="xs" v="ghost" onClick={e=>{e.stopPropagation();togVis(l._t,l.id);}}><Ic n={l.visible?'eye':'eyeOff'} s={11} c="var(--txt3)"/></Btn>
        {l._t!=='stagebg'&&<Btn sz="xs" v="ghost" onClick={e=>{e.stopPropagation();del(l._t,l.id);}}><Ic n="trash" s={10} c="var(--red)"/></Btn>}
      </div>))}
    </div>
    {selId&&<LayerStylePanel id={selId}/>} 
  </div>);
}

function LayerStylePanel({id}){
  const fl=useStore(layerSt,s=>s.feat.find(l=>l.id===id));
  const rl=useStore(layerSt,s=>s.routes.find(l=>l.id===id));
  const al=useStore(layerSt,s=>s.arrows?.find(l=>l.id===id));
  const bl=useStore(layerSt,s=>s.borders?.find(l=>l.id===id));
  const basemapItem=useStore(mapSt,s=>(s.basemapStack||[]).find(l=>l.id===id));
  const stageState=useStore(mapSt);
  const stageBgItem=id==='stage-bg-layer'?{id:'stage-bg-layer',title:'Stage Background',visible:stageState.stageBgVisible!==false}:null;
  const item=fl||rl||al||bl||basemapItem||stageBgItem;if(!item)return null;
  const type=fl?'feat':rl?'routes':al?'arrows':bl?'borders':basemapItem?'basemap':'stagebg';
  const us=p=>type==='stagebg'?mapSt.set(p):type==='basemap'?mapSt.set(s=>({basemapStack:(s.basemapStack||[]).map(l=>l.id===id?{...l,...p,style:{...(l.style||{}),...p}}:l)})):layerSt.set(s=>({[type]:s[type].map(l=>l.id===id?{...l,style:{...l.style,...p}}:l)}));
  const u=p=>type==='stagebg'?mapSt.set(p):type==='basemap'?mapSt.set(s=>({basemapStack:(s.basemapStack||[]).map(l=>l.id===id?{...l,...p}:l)})):layerSt.set(s=>({[type]:s[type].map(l=>l.id===id?{...l,...p}:l)}));

  return(<div style={{borderTop:'1px solid var(--border)',padding:'10px 12px',flexShrink:0,background:'var(--bg-base)',maxHeight:300,overflow:'auto'}}>
    <div style={{fontSize:10,fontFamily:'var(--fm)',color:type==='routes'?'var(--orange)':type==='arrows'?'var(--accent)':type==='borders'?'var(--purple)':type==='basemap'?'var(--green)':'var(--blue)',marginBottom:8}}>{type.toUpperCase()} — {item.title}</div>

// HIGH-QUALITY FRAME-BY-FRAME VIDEO RENDERER
// Renders each frame at an exact timestamp, waits for tile loads,
// then captures — producing jitter-free smooth video at any resolution.

// Wait for MapLibre to finish rendering a frame after a camera change
const DEFAULT_BACKEND_BASE='http://127.0.0.1:7843';
function getBackendBase(){
  try{
    const live=(typeof liveTrafficSt!=='undefined' && liveTrafficSt && typeof liveTrafficSt.get==='function')?liveTrafficSt.get():null;
    const fromStore=String(live?.backendBase||'').trim();
    if(fromStore) return fromStore.replace(/\/$/,'');
  }catch{}
  try{
    const saved=String(localStorage.getItem('mapdirector_backend_base')||'').trim();
    if(saved) return saved.replace(/\/$/,'');
  }catch{}
  return DEFAULT_BACKEND_BASE;
}
function backendHttpUrl(path=''){
  const base=getBackendBase();
  const cleanPath=String(path||'').startsWith('/')?String(path||''):`/${String(path||'')}`;
  return `${base}${cleanPath}`;
}
function backendWsUrl(path='/ws'){
  const base=getBackendBase();
  try{
    const u=new URL(base, window.location.href);
    u.protocol = u.protocol==='https:' ? 'wss:' : 'ws:';
    u.pathname = String(path||'/ws').startsWith('/') ? String(path||'/ws') : `/${String(path||'/ws')}`;
    u.search='';
    u.hash='';
    return u.toString();
  }catch{
    const wsBase=base.replace(/^https:/i,'wss:').replace(/^http:/i,'ws:');
    return `${wsBase.replace(/\/$/,'')}${String(path||'/ws').startsWith('/') ? String(path||'/ws') : `/${String(path||'/ws')}`}`;
  }
}

// ── MapLibre v5 canvas snapshot ───────────────────────────────────────────
// MapLibre v5 uses WebGL2 and clears/swaps the drawing buffer at the end of
// every frame — even with preserveDrawingBuffer:true — when crossing any async
// boundary (await, setTimeout, rAF chain).  The ONLY safe way to read pixels
// is SYNCHRONOUSLY inside a map 'render' event callback, before the JS engine
// yields back to the browser compositor.
//
// Strategy:
//   1. Force a repaint with map.triggerRepaint()
//   2. In the very next 'render' callback (sync, on the same JS task),
//      copy the WebGL canvas pixels into an intermediate 2D canvas
//   3. Return that 2D canvas — it's safe to read from any time after this

function captureMapCanvas(map){
  return new Promise((resolve, reject)=>{
    const stateNow = mapSt.get ? mapSt.get() : null;
    if(stateNow?.google3dEnabled){
      try{
        const viewer=(window.__mdGoogle3DViewer&&window.__mdGoogle3DViewer())||null;
        const glCanvas=(viewer&&viewer.canvas) || document.querySelector('.cesium-widget canvas') || document.querySelector('#cesiumContainer canvas') || document.querySelector('canvas.cesium-widget');
        if(viewer){ try{ viewer.resize(); viewer.render(); viewer.scene&&viewer.scene.requestRender&&viewer.scene.requestRender(); }catch(_e){} }
        if(glCanvas && glCanvas.width && glCanvas.height){
          const tmp=document.createElement('canvas');
          tmp.width=glCanvas.width; tmp.height=glCanvas.height;
          const ctx2d=tmp.getContext('2d',{alpha:false});
          ctx2d.fillStyle='#000'; ctx2d.fillRect(0,0,tmp.width,tmp.height);
          ctx2d.drawImage(glCanvas,0,0);
          resolve(tmp);
          return;
        }
      }catch(e){ console.warn('capture google3d canvas failed', e); }
    }
    const timeout = setTimeout(()=>reject(new Error('captureMapCanvas timeout')), 8000);

    // We need the map to actually fire a render event.
    // If it's already idle, triggerRepaint schedules one.
    const onRender = ()=>{
      clearTimeout(timeout);
      // Read pixels SYNCHRONOUSLY here — before any await or rAF
      const glCanvas = map.getCanvas();
      const w = glCanvas.width;
      const h = glCanvas.height;
      if(!w || !h){ resolve(null); return; }

      // Blit synchronously before any await or rAF.
      // Use drawStageBackgroundForExport so gradient mode is handled correctly —
      // assigning a CSS gradient string to fillStyle silently becomes black.
      const stateSnap=mapSt.get?mapSt.get():null;
      const tmp = document.createElement('canvas');
      tmp.width = w; tmp.height = h;
      const ctx2d = tmp.getContext('2d');
      try{
        const sOp=(globalThis.getResolvedStageBgOpacity||getResolvedStageBgOpacity)(stateSnap);
        if(stateSnap?.stageBgVisible!==false && sOp>0.001){
          drawStageBackgroundForExport(ctx2d,w,h,stateSnap);
        }else{
          const ctn=map.getContainer?map.getContainer():null;
          const css=(ctn&&ctn.style.background)||'#000';
          ctx2d.fillStyle=(css.startsWith('linear-gradient')||css.startsWith('radial-gradient'))?'#000':css;
          ctx2d.fillRect(0,0,w,h);
        }
      }catch{ctx2d.fillStyle='#000';ctx2d.fillRect(0,0,w,h);}
      ctx2d.drawImage(glCanvas, 0, 0);  // synchronous — same JS task as render

      resolve(tmp);
    };

    map.once('render', onRender);
    try{ map.triggerRepaint(); }catch(e){ clearTimeout(timeout); reject(e); }
  });
}

// ── Wait for tiles/layers to finish loading ───────────────────────────────
// Waits for idle, then settles for SETTLE_MS with no new render events.
// Does NOT attempt to read the canvas here — that happens in captureMapCanvas.
function waitMapIdle(map, timeoutMs=5000){
  const SETTLE_MS = 120;
  return new Promise(resolve=>{
    let hardTimer = null;
    let settleTimer = null;
    let done = false;

    const finish = ()=>{
      if(done) return; done=true;
      clearTimeout(hardTimer); clearTimeout(settleTimer);
      map.off('render', onRender);
      resolve();
    };

    const onRender = ()=>{
      clearTimeout(settleTimer);
      settleTimer = setTimeout(finish, SETTLE_MS);
    };

    const onIdle = ()=>{
      map.on('render', onRender);
      settleTimer = setTimeout(finish, SETTLE_MS);
    };

    hardTimer = setTimeout(finish, timeoutMs);
    map.once('idle', onIdle);
  });
}

// ── Cover-crop draw ───────────────────────────────────────────────────────
function drawCoverCrop(ctx, src, dstW, dstH){
  const sw = src.width || src.naturalWidth || dstW;
  const sh = src.height || src.naturalHeight || dstH;
  if(!sw || !sh) return;
  const scale = Math.max(dstW/sw, dstH/sh);
  ctx.drawImage(src, (dstW-sw*scale)/2, (dstH-sh*scale)/2, sw*scale, sh*scale);
}

function drawStageBackgroundForExport(octx,dstW,dstH,state=mapSt.get()){
  try{
    const getOp=(globalThis.getResolvedStageBgOpacity || getResolvedStageBgOpacity);
    const stageOpacity=clampStageAlpha(getOp(state),1);
    if(stageOpacity<=0.001 || state?.stageBgVisible===false) return;
    octx.save();
    if((state?.stageBgMode||'solid')==='gradient'){
      const g=makeStageFillStyle(octx,dstW,dstH,state);
      if(g && typeof g.addColorStop==='function'){
        const c1=toRgbaWithAlpha(state?.stageBgColor||'#0b0d12', stageOpacity);
        const c2=toRgbaWithAlpha(state?.stageBgColor2||'#243b55', stageOpacity);
        const ang=((Number(state?.stageBgGradientAngle)||135)%360+360)%360;
        const rad=ang*Math.PI/180;
        const cx=dstW/2, cy=dstH/2;
        const length=Math.sqrt(dstW*dstW+dstH*dstH)/2;
        const dx=Math.cos(rad)*length, dy=Math.sin(rad)*length;
        const grad=octx.createLinearGradient(cx-dx, cy-dy, cx+dx, cy+dy);
        grad.addColorStop(0,c1);
        grad.addColorStop(1,c2);
        octx.fillStyle=grad;
      } else {
        octx.fillStyle=makeStageFillStyle(octx,dstW,dstH,state);
        octx.globalAlpha=stageOpacity;
      }
    } else {
      octx.fillStyle=toRgbaWithAlpha(state?.stageBgColor||'#0b0d12', stageOpacity);
    }
    octx.fillRect(0,0,dstW,dstH);
    octx.restore();
  }catch(e){ console.warn('stage background export failed', e); }
}
function getCoverCropTransform(srcW,srcH,dstW,dstH){
  const scale=Math.max(dstW/srcW, dstH/srcH);
  return {scale, dx:(dstW-srcW*scale)/2, dy:(dstH-srcH*scale)/2};
}

function getStageMaskScreenRingsForExport(map,dstW,dstH,state=mapSt.get()){
  try{
    if(!map || !state?.maskEnabled) return []; // export: check maskEnabled only, not stageLookEnabled
    const layerState=layerSt.get();
    const srcLayer=findMaskSourceLayerById(state.maskSourceLayerId, layerState);
    if(!srcLayer?.geojson) return [];
    const rings=collectPolygonRingsFromGeoJSON(srcLayer.geojson, { keepOnlyLargest:false });
    if(!rings.length) return [];
    const mapCanvas=map.getCanvas && map.getCanvas();
    const cssW=(mapCanvas && mapCanvas.clientWidth) || dstW;
    const cssH=(mapCanvas && mapCanvas.clientHeight) || dstH;
    const tx=getCoverCropTransform(cssW,cssH,dstW,dstH);
    return (rings||[])
      .map(r=>projectRingToScreen(map,r))
      .filter(pts=>Array.isArray(pts) && pts.length>=3)
      .map(pts=>pts.map(([x,y])=>[
        tx.dx + x*tx.scale,
        tx.dy + y*tx.scale,
      ]))
      .filter(pts=>pts.every(([x,y])=>Number.isFinite(x) && Number.isFinite(y)));
  }catch(e){ console.warn('stage mask export screen rings failed', e); }
  return [];
}
function buildStageMaskCanvasForExport(dstW,dstH,map=globalMapRef.current,state=mapSt.get()){
  try{
    const screenRings=getStageMaskScreenRingsForExport(map,dstW,dstH,state);
    if(!screenRings.length) return null;
    const maskCanvas=document.createElement('canvas');
    maskCanvas.width=dstW; maskCanvas.height=dstH;
    const mctx=maskCanvas.getContext('2d');
    if(!mctx) return null;
    const drawPath=(ctx,pts)=>{ pts.forEach(([x,y],i)=>{ if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.closePath(); };
    mctx.save();
    mctx.fillStyle='#fff';
    mctx.beginPath();
    if(state?.maskInvert){
      mctx.rect(0,0,dstW,dstH);
      screenRings.forEach(pts=>drawPath(mctx,pts));
      mctx.fill('evenodd');
    }else{
      screenRings.forEach(pts=>drawPath(mctx,pts));
      mctx.fill('evenodd');
    }
    mctx.restore();
    maskCanvas.__screenRings = screenRings;
    return maskCanvas;
  }catch(e){ console.warn('stage mask export canvas failed', e); }
  return null;
}
function drawStageMaskOutlineForExport(octx, maskCanvas){
  try{
    const screenRings = maskCanvas && maskCanvas.__screenRings;
    if(!screenRings || !screenRings.length) return;
    const drawPath=(ctx,pts)=>{ pts.forEach(([x,y],i)=>{ if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.closePath(); };
    octx.save();
    octx.strokeStyle='rgba(255,255,255,0.22)';
    octx.lineWidth=1.25;
    octx.lineJoin='round';
    octx.lineCap='round';
    octx.beginPath();
    screenRings.forEach(pts=>drawPath(octx,pts));
    octx.stroke();
    octx.restore();
  }catch(e){ console.warn('stage mask export outline failed', e); }
}

function drawVisibleStageBackgroundForExport(octx,dstW,dstH,maskCanvas,state=mapSt.get()){
  try{
    const getOp=(globalThis.getResolvedStageBgOpacity || getResolvedStageBgOpacity);
    const stageOpacity=clampStageAlpha(getOp(state),1);
    if(stageOpacity<=0.001 || state?.stageBgVisible===false) return false;
    if(!maskCanvas) return false;
    const temp=document.createElement('canvas');
    temp.width=dstW; temp.height=dstH;
    const tctx=temp.getContext('2d');
    if(!tctx) return false;
    drawStageBackgroundForExport(tctx,dstW,dstH,state);
    tctx.globalCompositeOperation = state?.maskInvert ? 'destination-in' : 'destination-out';
    tctx.drawImage(maskCanvas,0,0,dstW,dstH);
    tctx.globalCompositeOperation='source-over';
    octx.drawImage(temp,0,0);
    return true;
  }catch(e){ console.warn('visible stage background export failed', e); }
  return false;
}
function drawStageMaskedMapForExport(octx,mapSnap,dstW,dstH,map=globalMapRef.current,state=mapSt.get()){
  try{
    if(!mapSnap){ return false; }
    // Apply mask whenever maskEnabled + maskSourceLayerId are set (regardless of stageLookEnabled live toggle)
    if(!state?.maskEnabled || !state?.maskSourceLayerId || !map){ drawCoverCrop(octx,mapSnap,dstW,dstH); return true; }
    const maskCanvas = buildStageMaskCanvasForExport(dstW,dstH,map,state);
    if(!maskCanvas){ drawCoverCrop(octx,mapSnap,dstW,dstH); return true; }
    const temp=document.createElement('canvas');
    temp.width=dstW; temp.height=dstH;
    const tctx=temp.getContext('2d',{willReadFrequently:true});
    if(!tctx){ drawCoverCrop(octx,mapSnap,dstW,dstH); return true; }
    drawCoverCrop(tctx,mapSnap,dstW,dstH);
    tctx.globalCompositeOperation='destination-in';
    tctx.drawImage(maskCanvas,0,0,dstW,dstH);
    tctx.globalCompositeOperation='source-over';
    octx.drawImage(temp,0,0);
    drawStageMaskOutlineForExport(octx, maskCanvas);
    return true;
  }catch(e){ console.warn('stage masked map export failed', e); }
  return false;
}
function drawStageOverlayForExport(octx,dstW,dstH,map=globalMapRef.current,state=mapSt.get()){
  try{
    if(!state?.maskEnabled || !map) return;
    const layerState=layerSt.get();
    const srcLayer=findMaskSourceLayerById(state.maskSourceLayerId, layerState);
    if(!srcLayer?.geojson) return;
    const rings=collectPolygonRingsFromGeoJSON(srcLayer.geojson, { keepOnlyLargest:false });
    if(!rings.length) return;
    const temp=document.createElement('canvas');
    temp.width=Math.max(1,dstW); temp.height=Math.max(1,dstH);
    const tctx=temp.getContext('2d');
    if(!tctx) return;
    tctx.clearRect(0,0,dstW,dstH);
    tctx.globalAlpha=getResolvedStageBgOpacity(state);
    tctx.fillStyle=makeStageFillStyle(tctx,dstW,dstH,state);
    const mapCanvas=map.getCanvas && map.getCanvas();
    const cssW=(mapCanvas && mapCanvas.clientWidth) || dstW;
    const cssH=(mapCanvas && mapCanvas.clientHeight) || dstH;
    const srcW=(mapCanvas && mapCanvas.width) || dstW;
    const srcH=(mapCanvas && mapCanvas.height) || dstH;
    const pxScaleX=srcW/Math.max(1,cssW);
    const pxScaleY=srcH/Math.max(1,cssH);
    const tx=getCoverCropTransform(srcW,srcH,dstW,dstH);
    const screenRings=(rings||[]).map(r=>projectRingToScreen(map,r)).filter(Boolean).map(pts=>pts.map(([x,y])=>[
      tx.dx + (x*pxScaleX)*tx.scale,
      tx.dy + (y*pxScaleY)*tx.scale,
    ]));
    if(!screenRings.length) return;
    const drawPath=(pts)=>{ pts.forEach(([x,y],i)=>{ if(i===0) tctx.moveTo(x,y); else tctx.lineTo(x,y); }); tctx.closePath(); };
    if(state.maskInvert){
      tctx.beginPath(); screenRings.forEach(drawPath); tctx.fill('evenodd');
    }else{
      tctx.beginPath(); tctx.rect(0,0,dstW,dstH); screenRings.forEach(drawPath); tctx.fill('evenodd');
    }
    octx.drawImage(temp,0,0);
  }catch(e){ console.warn('stage overlay export failed', e); }
}

// ── Composite one export frame ────────────────────────────────────────────
// Captures the map canvas synchronously (v5-safe), then composites Studio Look + SVG overlay.
function forceStageOverlaySyncForExport(map,state=mapSt.get()){
  try{
    if(!map) return false;
    if(!state?.stageLookEnabled){ clearStageOverlayCanvas(map); return false; }
    const layerState=layerSt.get();
    const srcLayer=findMaskSourceLayerById(state.maskSourceLayerId, layerState);
    if(!state.maskEnabled || !srcLayer?.geojson){ clearStageOverlayCanvas(map); return false; }
    const rings=collectPolygonRingsFromGeoJSON(srcLayer.geojson, { keepOnlyLargest:false });
    if(!rings.length){ clearStageOverlayCanvas(map); return false; }
    drawStageMaskOverlay(map, rings, state);
    return true;
  }catch(e){ console.warn('force stage overlay sync export failed', e); }
  return false;
}
function drawLiveStageOverlayCanvasForExport(octx,dstW,dstH,map=globalMapRef.current){
  try{
    if(!map || !map.getContainer) return false;
    const live = map.getContainer().querySelector('#'+STAGE_OVERLAY_CANVAS_ID);
    if(!live || !live.width || !live.height) return false;
    octx.drawImage(live, 0, 0, live.width, live.height, 0, 0, dstW, dstH);
    return true;
  }catch(e){ console.warn('live stage overlay export failed', e); }
  return false;
}
function getLiveStageOverlayCanvas(map=globalMapRef.current){
  try{
    const container = map && map.getContainer ? map.getContainer() : null;
    return container ? container.querySelector('#'+STAGE_OVERLAY_CANVAS_ID) : null;
  }catch{ return null; }
}

async function compositeFrame(map, offscreen, octx, dstW, dstH){
  const state=mapSt.get();
  const mapSnap = await captureMapCanvas(map);
  octx.clearRect(0,0,dstW,dstH);

  const stageBgOn=getResolvedStageBgOpacity(state)>0.001 && state?.stageBgVisible!==false;
  const maskActive=state.maskEnabled && !!state.maskSourceLayerId; // export uses mask whenever maskEnabled+source set, regardless of stageLookEnabled

  if(maskActive){
    // Build mask once: white = inside mask region
    const maskCanvas=buildStageMaskCanvasForExport(dstW,dstH,map,state);

    // Step 1: stage background fills the entire frame as base
    if(stageBgOn) drawStageBackgroundForExport(octx,dstW,dstH,state);

    // Step 2: map rendered ONLY inside the mask
    if(mapSnap){
      const t1=document.createElement('canvas'); t1.width=dstW; t1.height=dstH;
      const c1=t1.getContext('2d');
      if(c1){
        drawCoverCrop(c1,mapSnap,dstW,dstH);
        if(maskCanvas){
          c1.globalCompositeOperation=state.maskInvert?'destination-out':'destination-in';
          c1.drawImage(maskCanvas,0,0,dstW,dstH);
          c1.globalCompositeOperation='source-over';
        }
        octx.drawImage(t1,0,0);
      }
    }

    // Step 3: stage background painted ONLY outside the mask (covers base bg there)
    if(stageBgOn && maskCanvas){
      const t2=document.createElement('canvas'); t2.width=dstW; t2.height=dstH;
      const c2=t2.getContext('2d');
      if(c2){
        drawStageBackgroundForExport(c2,dstW,dstH,state);
        c2.globalCompositeOperation=state.maskInvert?'destination-in':'destination-out';
        c2.drawImage(maskCanvas,0,0,dstW,dstH);
        c2.globalCompositeOperation='source-over';
        octx.drawImage(t2,0,0);
      }
    }

    // Step 4: overlay canvas and mask outline
    try{forceStageOverlaySyncForExport(map,state);}catch{}
    try{drawLiveStageOverlayCanvasForExport(octx,dstW,dstH,map);}catch{}
    if(maskCanvas) drawStageMaskOutlineForExport(octx,maskCanvas);
  } else {
    if(stageBgOn) drawStageBackgroundForExport(octx,dstW,dstH,state);
    if(mapSnap) drawCoverCrop(octx,mapSnap,dstW,dstH);
  }
  const inner = document.getElementById('map-viewport-inner');
  const svgEl = inner
    ? Array.from(inner.querySelectorAll('svg')).find(
        s => s.style.pointerEvents === 'none' && s.style.position === 'absolute'
      )
    : null;
  if(svgEl){
    try{
      const rect   = svgEl.getBoundingClientRect();
      const svgW   = Math.round(rect.width)  || dstW;
      const svgH   = Math.round(rect.height) || dstH;
      const clone  = svgEl.cloneNode(true);
      clone.setAttribute('width',  svgW);
      clone.setAttribute('height', svgH);
      clone.setAttribute('xmlns',  'http://www.w3.org/2000/svg');
      const svgStr = '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(clone);
      const blob   = new Blob([svgStr], {type:'image/svg+xml;charset=utf-8'});
      const url    = URL.createObjectURL(blob);
      await new Promise(res=>{
        const img = new Image();
        img.onload = ()=>{ drawCoverCrop(octx, img, dstW, dstH); res(); };
        img.onerror = res;
        img.src = url;
      });
      URL.revokeObjectURL(url);
    }catch(e){ console.warn('SVG overlay composite failed:', e); }
  }
}


// ── Check server (WebSocket probe) ────────────────────────────────────────
function checkServer(){
  return new Promise(resolve=>{
    try{
      const ws=new WebSocket(SERVER_WS());
      const t=setTimeout(()=>{ws.close();resolve(false);},1800);
      ws.onopen=()=>{clearTimeout(t);ws.close();resolve(true);};
      ws.onerror=()=>{clearTimeout(t);resolve(false);};
    }catch{resolve(false);}
  });
}

// ── WebSocket render: pure protocol ───────────────────────────────────────
// Text frames  → JSON control messages  {type:'start'|'end'|'cancel', ...}
// Binary frames → raw RGBA bytes only   (no prefix, no wrapper)
// Server replies with text JSON:  {type:'progress',pct:0-100}
//                                 {type:'error',msg:'...'}
// Server replies with binary:     MP4 data chunks, then {type:'done'}
//
// This avoids ALL prefix-byte slicing issues on both sides.

async function renderAndStreamToServer({map,tracks,durMs,fps,width,height,onProgress,cancelRef,onPhase}){
  const frameCount=Math.ceil(durMs/1000*fps);
  const frameMs=1000/fps;
  const offscreen=document.createElement('canvas');
  offscreen.width=width; offscreen.height=height;
  const octx=offscreen.getContext('2d',{willReadFrequently:true});

  return new Promise(async(resolve,reject)=>{
    let ws,done=false;
    const fail=msg=>{if(!done){done=true;try{ws&&ws.close();}catch{}reject(new Error(msg));}};
    const succeed=blob=>{if(!done){done=true;try{ws&&ws.close();}catch{}resolve(blob);}};

    try{ ws=new WebSocket(SERVER_WS()); ws.binaryType='arraybuffer'; }
    catch(e){fail('WebSocket open failed: '+e.message);return;}

    const mp4Parts=[];

    ws.onerror =()=>fail('WebSocket error — server running at http://127.0.0.1:7843?');
    ws.onclose =e=>{if(!done&&mp4Parts.length===0)fail('Connection closed unexpectedly (code '+e.code+')');};

    ws.onmessage=e=>{
      if(typeof e.data==='string'){
        // JSON control from server
        let msg; try{msg=JSON.parse(e.data);}catch{return;}
        if(msg.type==='progress'){
          onProgress&&onProgress(0.80+msg.pct/100*0.19);
        } else if(msg.type==='error'){
          fail('Server: '+msg.msg);
        } else if(msg.type==='done'){
          succeed(new Blob(mp4Parts,{type:'video/mp4'}));
        }
      } else {
        // Binary: MP4 chunk
        mp4Parts.push(e.data.slice(0)); // copy the ArrayBuffer
      }
    };

    ws.onopen=async()=>{
      // Send START as JSON text
      ws.send(JSON.stringify({type:'start',width,height,fps,frameCount:frameCount+1,fmt:'jpeg'}));

      // Render + stream loop
      for(let i=0;i<=frameCount;i++){
        if(done) return;
        if(cancelRef&&cancelRef.current){
          ws.send(JSON.stringify({type:'cancel'}));
          fail('Cancelled'); return;
        }

        const ms=Math.min(i*frameMs,durMs);
        const cam=interpCam(tracks,ms);
        if(cam) map.jumpTo({center:[cam.lng,cam.lat],zoom:cam.zoom,bearing:cam.bearing,pitch:cam.pitch});
        const op=interpOpacity(tracks,ms);
        if(op) globalOpacityRef.current=op;
        globalLayerKfRef.current=interpLayerKf(tracks,ms);

        await waitMapIdle(map,4000);
        await compositeFrame(map,offscreen,octx,width,height);

        // Send as JPEG (~200KB) instead of raw RGBA (~33MB) to avoid
        // Chrome fragmenting large ArrayBuffer sends into continuation frames.
        const jpegBlob=await new Promise(r=>offscreen.toBlob(r,'image/jpeg',0.92));
        ws.send(await jpegBlob.arrayBuffer());

        onProgress&&onProgress(i/(frameCount)*0.80);
        onPhase&&onPhase(i===frameCount?'Encoding MP4…':`Rendering frame ${i+1}/${frameCount+1}…`);
      }

      ws.send(JSON.stringify({type:'end'}));
      onPhase&&onPhase('Encoding MP4…');
    };
  });
}

async function waitForExportFrame(map){
  try{ if(map && typeof map.triggerRepaint==='function') map.triggerRepaint(); }catch{}
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
}

// ── Fallback: WebM via MediaRecorder ──────────────────────────────────────
async function encodeViaMediaRecorder({map,tracks,durMs,fps,width,height,onProgress,cancelRef,onPhase}){
  const frameCount=Math.max(1, Math.ceil(durMs/1000*fps));
  const frameMs=1000/Math.max(1,fps);
  const captureCanvas=document.createElement('canvas');
  captureCanvas.width=width; captureCanvas.height=height;
  captureCanvas.style.cssText='position:fixed;left:-10000px;top:0;width:'+Math.max(2,Math.round(width/4))+'px;height:'+Math.max(2,Math.round(height/4))+'px;opacity:0;pointer-events:none;z-index:-1;';
  document.body.appendChild(captureCanvas);
  const octx=captureCanvas.getContext('2d',{willReadFrequently:true, alpha:true});
  octx.clearRect(0,0,width,height);
  const mimes=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
  const mime=mimes.find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
  const stream=(captureCanvas.captureStream ? captureCanvas.captureStream(0) : captureCanvas.captureStream(Math.max(1, fps)));
  const [videoTrack] = stream.getVideoTracks();
  const recorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:Math.max(18e6,width*height*Math.max(1,fps)*0.12)});
  const chunks=[];
  recorder.ondataavailable=e=>{ if(e.data&&e.data.size>0) chunks.push(e.data); };
  recorder.start();
  await new Promise(r=>setTimeout(r,80));

  let nextTick = performance.now();
  for(let i=0;i<=frameCount;i++){
    if(cancelRef&&cancelRef.current){ try{recorder.stop();}catch{} throw new Error('Cancelled'); }
    const ms=Math.min(i*frameMs,durMs);
    const cam=interpCam(tracks,ms);
    if(cam) map.jumpTo({center:[cam.lng,cam.lat],zoom:cam.zoom,bearing:cam.bearing,pitch:cam.pitch});
    const op=interpOpacity(tracks,ms);
    if(op) globalOpacityRef.current=op;
    globalLayerKfRef.current=interpLayerKf(tracks,ms);
    await waitForExportFrame(map);
    await compositeFrame(map,captureCanvas,octx,width,height);
    if(videoTrack && typeof videoTrack.requestFrame === 'function'){
      try{ videoTrack.requestFrame(); }catch{}
    }
    onProgress&&onProgress(i/frameCount);
    onPhase&&onPhase(`Rendering frame ${i+1}/${frameCount+1}…`);
    nextTick += frameMs;
    const delay = nextTick - performance.now();
    if(delay > 1) await new Promise(r=>setTimeout(r, delay));
  }
  return await new Promise(resolve=>{
    recorder.onstop=()=>{
      try{ stream.getTracks().forEach(t=>t.stop()); }catch{}
      try{ captureCanvas.remove(); }catch{}
      resolve(new Blob(chunks,{type:mime}));
    };
    setTimeout(()=>{ try{ recorder.requestData(); }catch{}; try{ recorder.stop(); }catch{}; }, Math.max(120, Math.round(frameMs*2)));
  });
}

  const[fmt,setFmt]=useState('png');
  const[busy,setBusy]=useState(false);
  const[done,setDone]=useState(false);
  const[progress,setProgress]=useState(0);
  const[phase,setPhase]=useState('');
  const[fps,setFps]=useState(30);
  const[resId,setResId]=useState('fhd');

  useEffect(()=>{

  const getTargetDims=()=>{

      const data={project:project?{...project,scenes}:project,map:mapSt.get(),layers:layerSt.get(),labels:labelSt.get(),markers:markerSt.get(),timeline:tlSt.get(),sceneKfs:allSceneKfs,imageOverlays:iov,exportedAt:new Date().toISOString()};

      try{

        setPhase('Capturing frame…');
        const{w,h}=getTargetDims();

        },'image/png');});

      setBusy(false);setDone(true);setPhase('');setTimeout(()=>setDone(false),3000);return;
    }

    // ── VIDEO ──

      cancelRef.current={current:false};
      setBusy(true);setProgress(0);

      try{
        const map=globalMapRef.current;if(!map)throw new Error('Map not ready');
        const{w,h}=getTargetDims();
        const{durMs,tracks}=tlSt.get();
        if(!tracks.length||!durMs){alert('No timeline tracks to render.');setBusy(false);return;}

        const onProg=p=>{setProgress(Math.round(p*100));};

        if(useServer&&serverOk){
          // ── Server path: H.264/MP4 via FFmpeg over WebSocket ──
          const blob=await renderAndStreamToServer({
            map,tracks,durMs,fps,width:w,height:h,
            onProgress:p=>onProg(p),
            onPhase:p=>setPhase(p),
            cancelRef:cancelRef.current,

        } else {
          // ── Fallback: WebM via MediaRecorder ──
          const blob=await encodeViaMediaRecorder({
            map,tracks,durMs,fps,width:w,height:h,
            onProgress:p=>onProg(p),
            onPhase:p=>setPhase(p),
            cancelRef:cancelRef.current,
          });
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');a.href=url;a.download=`mapdirector-${w}x${h}-${fps}fps-${Date.now()}.webm`;a.click();
          URL.revokeObjectURL(url);
        }

        const cam=mapSt.get().cam;

      }catch(err){
        if(err.message!=='Cancelled') alert('Export failed: '+err.message);

      }
      setBusy(false);setDone(true);setPhase('');setTimeout(()=>setDone(false),4000);
    }
  };

  const {w:tw,h:th}=useMemo(()=>{try{return getTargetDims();}catch{return{w:1920,h:1080};}},[resId]);

  return(<div style={{flex:1,display:'flex',flexDirection:'column',overflow:'auto'}}><PH title="EXPORT"/>
    <div style={{padding:14,display:'flex',flexDirection:'column',gap:11}}>

      {/* Format tabs */}

      </div>
      {fmt==='json'&&<div style={{display:'flex',flexDirection:'column',gap:6}}>
        <div style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--txt3)',letterSpacing:'.08em'}}>IMPORT PROJECT</div>
        <Btn v="solid" sz="sm" onClick={()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';inp.onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const data=JSON.parse(await f.text());if(data.map)mapSt.set(data.map);if(data.layers)layerSt.set(data.layers);if(data.labels)labelSt.set(data.labels);if(data.markers)markerSt.set(data.markers);if(data.timeline)tlSt.set(data.timeline);if(data.imageOverlays)imgOverlaySt.set({list:data.imageOverlays});if(data.sceneKfs)Object.assign(sceneKfStore,data.sceneKfs);if(data.project){projSt.set(s=>({active:data.project,list:[data.project,...s.list.filter(p=>p.id!==data.project?.id)]}));}alert('Project imported!');setDone(true);setTimeout(()=>setDone(false),3000);}catch(err){alert('Import failed: '+err.message);}};inp.click();}}><Ic n="db" s={11}/>Import JSON</Btn>
        <div style={{fontSize:9,color:'var(--txt3)',fontFamily:'var(--fm)',lineHeight:'13px'}}>Loads layers, labels, markers, timeline, and image overlays from a saved .json file.</div>
      </div>}

      {/* Resolution picker */}
      {(fmt==='png'||fmt==='mp4')&&<div>
        <div style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--txt3)',marginBottom:5,letterSpacing:'.08em'}}>RESOLUTION <span style={{color:'var(--txt3)',fontWeight:400}}>(cover crop)</span></div>
        <div style={{display:'flex',flexDirection:'column',gap:3}}>
          {RESOLUTIONS.map(r=>(<button key={r.id} onClick={()=>setResId(r.id)} style={{padding:'5px 10px',background:resId===r.id?'var(--accent-dim)':'var(--bg-elevated)',border:`1px solid ${resId===r.id?'var(--accent-bdr)':'var(--border)'}`,borderRadius:3,color:resId===r.id?'var(--accent)':'var(--txt2)',fontSize:10,fontFamily:'var(--fm)',cursor:'pointer',textAlign:'left',transition:'all .1s'}}>{r.label}</button>))}
        </div>
        {resId!=='window'&&<div style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--txt3)',marginTop:4}}>{tw} × {th} px · cover crop</div>}
      </div>}

      {/* Video options */}
      {fmt==='mp4'&&<>
        <NI label="FPS" value={fps} onChange={setFps} min={15} max={60} step={1}/>

        {/* Server toggle */}
        <div style={{padding:10,background:'var(--bg-elevated)',border:'1px solid var(--border-hi)',borderRadius:5,display:'flex',flexDirection:'column',gap:7}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:10,fontFamily:'var(--fm)',color:'var(--txt2)',fontWeight:600}}>RENDER SERVER</span>
            {serverBadge}
          </div>
          <ToggleSwitch on={useServer} onToggle={()=>{setUseServer(v=>!v);setServerOk(null);}} label="Use localhost FFmpeg server"/>
          {useServer&&serverOk===false&&<div style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--orange)',lineHeight:'14px'}}>
            Server not found at port 7843.<br/>
            1. Copy <b>MapDirector.html</b> into the server folder.<br/>
            2. Run: <span style={{color:'var(--cyan)'}}>node server.js</span><br/>
            3. Open: <span style={{color:'var(--cyan)'}}>http://127.0.0.1:7843</span><br/>
            <button onClick={()=>checkServer().then(setServerOk)} style={{marginTop:4,padding:'2px 8px',background:'var(--bg-base)',border:'1px solid var(--border-hi)',borderRadius:3,color:'var(--txt2)',fontSize:9,fontFamily:'var(--fm)',cursor:'pointer'}}>↺ Retry</button>
          </div>}
          {useServer&&serverOk&&<div style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--txt3)',lineHeight:'14px'}}>Connected ✓ — frames stream one-by-one to FFmpeg. No RAM spike.</div>}
          {!useServer&&<div style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--txt3)',lineHeight:'13px'}}>Fallback: encodes as WebM/VP9 in-browser.</div>}
        </div>

        <div style={{padding:7,background:'var(--accent-dim)',border:'1px solid var(--accent-bdr)',borderRadius:4,fontSize:9,color:'var(--accent)',fontFamily:'var(--fm)',lineHeight:'14px'}}>
          Frame-accurate renderer · waits for tile idle per frame · cover-crop to target resolution<br/>
          <span style={{color:'var(--txt2)'}}>{frameCount} frames · {tw}×{th}</span>
        </div>

        {busy&&<div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--txt2)'}}>{phase}</span>
            <span style={{fontSize:10,fontFamily:'var(--fm)',color:'var(--accent)',fontWeight:700}}>{progress}%</span>
          </div>
          <div style={{height:4,background:'var(--bg-base)',borderRadius:3,overflow:'hidden'}}>
            <div style={{height:'100%',background:'var(--accent)',width:`${progress}%`,transition:'width .15s',borderRadius:3}}/>
          </div>
          <button onClick={()=>{cancelRef.current.current=true;}} style={{marginTop:6,padding:'3px 8px',background:'var(--bg-elevated)',border:'1px solid var(--red)',borderRadius:3,color:'var(--red)',fontSize:9,fontFamily:'var(--fm)',cursor:'pointer'}}>Cancel</button>
        </div>}
      </>}

      {fmt==='png'&&<div style={{padding:8,background:'var(--bg-elevated)',borderRadius:4,fontSize:10,color:'var(--txt3)',fontFamily:'var(--fm)',lineHeight:'14px'}}>Waits for all tiles to load, composites overlays, cover-crops to target size, exports PNG.</div>}
      {fmt==='json'&&<div style={{padding:8,background:'var(--bg-elevated)',borderRadius:4,fontSize:10,color:'var(--txt3)',fontFamily:'var(--fm)',lineHeight:'14px'}}>Saves all project data, layers, labels, and timeline keyframes as JSON.</div>}

      <Btn v="accent" sz="md" onClick={go} disabled={busy} sx={{marginTop:2}}>
        {busy?<><div style={{width:11,height:11,border:'2px solid rgba(0,0,0,.3)',borderTopColor:'#000',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>Exporting…</>
         :done?<><Ic n="check" s={13}/>Done!</>
         :<><Ic n="dl" s={13}/>Export {fmt==='mp4'?(useServer&&serverOk?'MP4':'VIDEO'):fmt.toUpperCase()}</>}
      </Btn>
    </div>
  </div>);
}

function Timeline(){
  const layerState=useStore(layerSt);
  const mapState=useStore(mapSt);
  const{tracks,playMs,durMs,playing,selKf}=useStore(tlSt);const scrollRef=useRef(null);const rafRef=useRef(null);const lastTRef=useRef(null);const dragKfRef=useRef(null);const dragPhRef=useRef(false);
  const[editingDur,setEditingDur]=useState(false);const[durInput,setDurInput]=useState('');const durInputRef=useRef(null);
  // Camera subtrack collapse: Set of parentCameraIds that are collapsed.
  // Both the camera row and its subtracks share the same parentCameraId value,
  // so we key the Set on parentCameraId (NOT tr.id) for consistent lookup.
  const[collapsedCams,setCollapsedCams]=useState(()=>new Set());
  const toggleCamCollapse=React.useCallback((parentCamId)=>{
    setCollapsedCams(prev=>{const n=new Set(prev);if(n.has(parentCamId))n.delete(parentCamId);else n.add(parentCamId);return n;});
  },[]);
  useEffect(()=>{if(!playing){if(rafRef.current)cancelAnimationFrame(rafRef.current);return;}lastTRef.current=performance.now();const tick=()=>{const now=performance.now();const dt=Math.min(now-lastTRef.current,100); // clamp dt to avoid huge jumps after tab switch
    lastTRef.current=now;tlSt.set(s=>{const next=s.playMs+dt;if(next>=s.durMs){setTimeout(()=>tlSt.set({playing:false,playMs:0}),0);return{playMs:s.durMs};}const cam=interpCam(s.tracks,next);if(cam&&globalMapRef.directCam)globalMapRef.directCam(cam);const op=interpOpacity(s.tracks,next);if(op)globalOpacityRef.current=op;const lk=interpLayerKf(s.tracks,next);globalLayerKfRef.current=lk;return{playMs:next};});rafRef.current=requestAnimationFrame(tick);};rafRef.current=requestAnimationFrame(tick);return()=>{if(rafRef.current)cancelAnimationFrame(rafRef.current);};},[playing]);
  useEffect(()=>{const onMove=e=>{if(dragPhRef.current){const el=scrollRef.current;if(!el)return;const rulerEl=document.getElementById('ruler-time-area');if(!rulerEl)return;const rect=rulerEl.getBoundingClientRect();const x=(e.clientX-rect.left)+el.scrollLeft;let ms=xToMs(x,durMs);const allKfMs=tlSt.get().tracks.flatMap(tr=>tr.kfs.map(k=>k.ms));for(const kms of allKfMs){if(Math.abs(kms-ms)<150){ms=kms;break;}}tlSt.set({playMs:ms});const cam=interpCam(tlSt.get().tracks,ms);if(cam)mapSt.set({cam:{lng:cam.lng,lat:cam.lat,zoom:cam.zoom,bearing:cam.bearing,pitch:cam.pitch}});const op=interpOpacity(tlSt.get().tracks,ms);if(op)globalOpacityRef.current=op;const lk=interpLayerKf(tlSt.get().tracks,ms);globalLayerKfRef.current=lk;}if(dragKfRef.current){const{trackId,kfId,startMs,startClientX}=dragKfRef.current;const dxMs=(e.clientX-startClientX)/(PPS/1000);const newMs=clamp(startMs+dxMs,0,durMs);tlSt.set(s=>({tracks:s.tracks.map(tr=>tr.id!==trackId?tr:{...tr,kfs:tr.kfs.map(kf=>kf.id!==kfId?kf:{...kf,ms:newMs}).sort((a,b)=>a.ms-b.ms)})}));} if(dragBlockRef.current){const d=dragBlockRef.current;const dxMs=(e.clientX-d.startClientX)/(PPS/1000);const minDur=120; if(d.mode==='move'){const span=d.end-d.start; let start=clamp(d.start+dxMs,0,Math.max(0,durMs-span)); setItemTrackWindow(d.trackId,start,start+span);} else if(d.mode==='start'){let start=clamp(d.start+dxMs,0,Math.max(0,d.end-minDur)); setItemTrackWindow(d.trackId,start,d.end);} else if(d.mode==='end'){let end=clamp(d.end+dxMs,d.start+minDur,durMs); setItemTrackWindow(d.trackId,d.start,end);} }};const onUp=()=>{dragPhRef.current=false;dragKfRef.current=null;dragBlockRef.current=null;};window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);return()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};},[durMs]);
  const addKf=useCallback(trackId=>{let ms=tlSt.get().playMs;const cam=mapSt.get().cam;const track=tlSt.get().tracks.find(t=>t.id===trackId);while(track?.kfs.some(k=>Math.abs(k.ms-ms)<1))ms+=1;
    const subDef=getCameraSubtrackDef(track?.type);
    const kf=track?.type==='opacity'
      ?{id:uid(),ms,props:{globalOpacity:1,labelsOpacity:1,markersOpacity:1,arrowsOpacity:1,layersOpacity:1},easing:'easeInOutCubic'}
      :track?.type==='layer'
      ?{id:uid(),ms,props:{opacity:1,scale:1},easing:'easeInOutCubic'}
      :subDef
      ?{id:uid(),ms,value:Number(cam?.[subDef.key])||0,easing:'easeInOutCubic'}
      :{id:uid(),ms,cam:{...cam},easing:'easeInOutCubic'};
    tlSt.set(s=>({tracks:s.tracks.map(tr=>tr.id!==trackId?tr:{...tr,kfs:[...tr.kfs,kf].sort((a,b)=>a.ms-b.ms)}),selKf:{trackId,kfId:kf.id}}));},[]);
  const delKf=useCallback((trackId,kfId)=>{tlSt.set(s=>({tracks:s.tracks.map(tr=>tr.id!==trackId?tr:{...tr,kfs:tr.kfs.filter(k=>k.id!==kfId)}),selKf:s.selKf?.kfId===kfId?null:s.selKf}));},[]);
  const snapToKf=(rawMs)=>{
    const allKfMs=tracks.flatMap(tr=>tr.kfs.map(k=>k.ms));

  const scrubAtLane=useCallback(e=>{e.stopPropagation();const rect=e.currentTarget.getBoundingClientRect();let ms=xToMs(e.clientX-rect.left,durMs);ms=snapToKf(ms);tlSt.set({playMs:ms});const cam=interpCam(tlSt.get().tracks,ms);if(cam)mapSt.set({cam:{lng:cam.lng,lat:cam.lat,zoom:cam.zoom,bearing:cam.bearing,pitch:cam.pitch}});const op=interpOpacity(tlSt.get().tracks,ms);if(op)globalOpacityRef.current=op;},[durMs,tracks]);

  };
  const addOpacityTrack=()=>{
    tlSt.set(s=>({tracks:[...s.tracks,{id:uid(),title:'Opacity',type:'opacity',color:'#00d4aa',kfs:[{id:uid(),ms:0,props:{globalOpacity:1,layersOpacity:1,labelsOpacity:1,markersOpacity:1,arrowsOpacity:1},easing:'easeInOutCubic'}]}]}));
  };
  const addLayerTrack=(layerId,layerTitle)=>{

    const end=tlSt.get().durMs||12000;
    tlSt.set(s=>({tracks:[...s.tracks,{id:uid(),title:layerTitle||'Layer',type:'layer',layerId,color:'#4da6ff',kfs:[{id:uid(),ms:0,props:{opacity:1,scale:1},easing:'easeInOutCubic'},{id:uid(),ms:end,props:{opacity:1,scale:1},easing:'easeInOutCubic'}]}]}));
  };
  // Expose to LayersPanel
  useEffect(()=>{globalMapRef.addLayerTrack=addLayerTrack;},[tracks]);
  useEffect(()=>{
    const items=orderedVisualItems(layerState, mapState);
    items.forEach(it=>{ if(!tlSt.get().tracks.some(t=>t.type==='layer'&&t.layerId===it.id)) addLayerTrack(it.id,it.title); });
    const itemIds=items.map(it=>it.id);
    tlSt.set(s=>({tracks:s.tracks.filter(t=>t.type!=='layer'||itemIds.includes(t.layerId))}));
  },[JSON.stringify(layerState.layerOrder||[]),JSON.stringify((mapState.basemapStack||[]).map(x=>x.id+':'+x.basemapId)),layerState.feat.length,layerState.routes.length,layerState.arrows.length,layerState.borders.length,layerState.labels.length,layerState.markers.length]);

  const delTrack=(trackId)=>{

  };

  const totalContentW=msToX(durMs)+LABEL_W+80;const phX=LABEL_W+msToX(playMs);
  const dragBlockRef=useRef(null);
  const ticks=useMemo(()=>{const arr=[];const step=durMs>20000?5:durMs>10000?2:1;for(let ms=0;ms<=durMs;ms+=step*1000)arr.push(ms);return arr;},[durMs]);
  const selTrack=selKf?tracks.find(tr=>tr.id===selKf.trackId):null;
  const selKfData=selKf&&tracks.flatMap(tr=>tr.kfs.map(k=>({...k,trackId:tr.id}))).find(k=>k.id===selKf.kfId);

        {selKfData.props&&selKfData.props.globalOpacity!=null&&OP_CHANNELS.map(ch=><OpSlider key={ch[0]} propKey={ch[0]} label={ch[1]} val={selKfData.props[ch[0]]??1} onChange={setOpProp}/>)}

        {selTrack&&getCameraSubtrackDef(selTrack.type)&&<div style={{display:'flex',alignItems:'center',gap:4}}>

        </div>}
        <Btn sz="xs" v="ghost" onClick={()=>delKf(selKf.trackId,selKf.kfId)}><Ic n="trash" s={9} c="var(--red)"/></Btn>
      </div>}
      <Btn sz="xs" v="ghost" onClick={addCameraTrack} title="Add camera track"><Ic n="cam" s={11}/>+Cam</Btn>
      <Btn sz="xs" v="ghost" onClick={addOpacityTrack} title="Add opacity track"><Ic n="eye" s={11}/>+Opacity</Btn>
      {editingDur
        ?<input ref={durInputRef} value={durInput} onChange={e=>setDurInput(e.target.value)}
            onBlur={()=>{const s=parseFloat(durInput);if(!isNaN(s)&&s>0){const ms=Math.round(s*1000);tlSt.set({durMs:ms});const proj=projSt.get();const sc=proj.active?.scenes?.[proj.activeSceneIdx];if(sc){const upd={...proj.active,scenes:proj.active.scenes.map((x,i)=>i===proj.activeSceneIdx?{...x,dur:ms}:x)};projSt.set(s2=>({active:upd,list:s2.list.map(p=>p.id===upd.id?upd:p)}))};}setEditingDur(false);}}
            onKeyDown={e=>{if(e.key==='Enter')e.currentTarget.blur();if(e.key==='Escape')setEditingDur(false);}}
            style={{width:52,background:'var(--bg-base)',border:'1px solid var(--accent-bdr)',borderRadius:3,color:'var(--accent)',fontSize:10,fontFamily:'var(--fm)',padding:'2px 4px',outline:'none',textAlign:'center'}}/>
        :<span onClick={()=>{setDurInput((durMs/1000).toFixed(1));setEditingDur(true);setTimeout(()=>durInputRef.current?.select(),30);}} title="Click to edit duration" style={{fontFamily:'var(--fm)',fontSize:10,color:'var(--txt3)',cursor:'pointer',padding:'2px 5px',borderRadius:3,border:'1px solid transparent'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--txt)';}} onMouseLeave={e=>{e.currentTarget.style.borderColor='transparent';e.currentTarget.style.color='var(--txt3)';}}>⏱ {(durMs/1000).toFixed(1)}s</span>
      }
      <span style={{fontFamily:'var(--fd)',fontSize:11,color:'var(--txt3)',letterSpacing:'.06em',marginLeft:4}}>TIMELINE</span>
    </div>
    <div ref={scrollRef} style={{flex:1,overflowX:'auto',overflowY:'auto',position:'relative',userSelect:'none'}}>
      <div style={{minWidth:totalContentW,position:'relative'}}>
        <div style={{height:RULER_H,display:'flex',position:'sticky',top:0,zIndex:5,background:'var(--bg-panel)',borderBottom:'1px solid var(--border)'}}>
          <div style={{width:LABEL_W,flexShrink:0,borderRight:'1px solid var(--border)',display:'flex',alignItems:'center',paddingLeft:10}}><span style={{fontSize:9,fontFamily:'var(--fm)',color:'var(--txt3)'}}>TRACK</span></div>
          <div id="ruler-time-area" style={{flex:1,position:'relative',cursor:'col-resize'}} onMouseDown={e=>{dragPhRef.current=true;const el=scrollRef.current;if(!el)return;const rect=e.currentTarget.getBoundingClientRect();const x=(e.clientX-rect.left)+el.scrollLeft;const ms=xToMs(x,durMs);tlSt.set({playMs:ms});const cam=interpCam(tlSt.get().tracks,ms);if(cam)mapSt.set({cam:{lng:cam.lng,lat:cam.lat,zoom:cam.zoom,bearing:cam.bearing,pitch:cam.pitch}});}}>
            {ticks.map(ms=>(<div key={ms} style={{position:'absolute',left:msToX(ms),top:0,bottom:0,borderLeft:'1px solid var(--border)',pointerEvents:'none'}}><span style={{position:'absolute',left:3,top:3,fontSize:8,fontFamily:'var(--fm)',color:'var(--txt3)',whiteSpace:'nowrap'}}>{ms/1000}s</span></div>))}
            <div style={{position:'absolute',left:msToX(playMs)-1,top:0,bottom:0,width:2,background:'var(--accent)',pointerEvents:'none',zIndex:3}}/>
          </div>
          <div style={{width:ADD_W,flexShrink:0,borderLeft:'1px solid var(--border)'}}/>
        </div>
        {tracks.map((tr,ti)=>{
          const isSub=!!getCameraSubtrackDef(tr.type);
          const isCamParent=tr.type==='camera';
          const parentCamId=tr.parentCameraId;
          // Hide subtrack rows when their parent camera is collapsed
          if(isSub && parentCamId && collapsedCams.has(parentCamId)) return null;
          const collapsed=isCamParent && collapsedCams.has(tr.parentCameraId);
          const nCams=tracks.filter(t=>t.type==='camera').length;
          return(<div key={tr.id} style={{height:TRACK_H,display:'flex',borderBottom:'1px solid var(--border)'}}>
          <div
            style={{width:LABEL_W,flexShrink:0,display:'flex',alignItems:'center',padding:'0 4px 0 8px',gap:4,borderRight:'1px solid var(--border)',background:ti%2===0?'var(--bg-panel)':'var(--bg-base)',cursor:isCamParent?'pointer':'default'}}
            onDoubleClick={isCamParent?e=>{e.stopPropagation();toggleCamCollapse(tr.parentCameraId);}:undefined}
            title={isCamParent?'Double-click to collapse/expand Zoom·Bearing·Pitch':undefined}>
            {isCamParent&&<span style={{fontSize:8,color:'var(--txt3)',flexShrink:0,marginRight:2,userSelect:'none'}}>{collapsed?'▶':'▼'}</span>}
            <div style={{width:8,height:8,borderRadius:2,background:tr.color,flexShrink:0}}/>
            <span style={{fontSize:9,fontFamily:'var(--fm)',color:isSub?'var(--txt3)':'var(--txt2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,paddingLeft:isSub?10:0}} title={tr.layerId?`Layer: ${tr.title}`:tr.title}>{tr.title}</span>
            {(tr.type!=='camera'||nCams>1)&&<button onClick={e=>{e.stopPropagation();delTrack(tr.id);}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--red)',fontSize:9,padding:'0 1px',lineHeight:1,opacity:0.6,flexShrink:0}} title="Delete track" onMouseEnter={e=>e.currentTarget.style.opacity='1'} onMouseLeave={e=>e.currentTarget.style.opacity='0.6'}>✕</button>}
          </div>
          <div style={{flex:1,position:'relative',cursor:'pointer',overflow:'hidden',background:ti%2===0?'rgba(10,10,20,.5)':'rgba(5,5,12,.6)'}} onClick={scrubAtLane}>
            {ticks.map(ms=>(<div key={ms} style={{position:'absolute',left:msToX(ms),top:0,bottom:0,width:1,background:'var(--border)',pointerEvents:'none'}}/>))}
            {tr.kfs.length>1&&<svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',overflow:'visible'}}><polyline points={tr.kfs.map(kf=>`${msToX(kf.ms)},${TRACK_H/2}`).join(' ')} stroke={tr.color} strokeWidth="1.5" fill="none" opacity=".3"/></svg>}
            {tr.type==='layer'&&(()=>{const win=getItemTrackWindow(tr,durMs);const left=msToX(win.start),width=Math.max(8,msToX(win.end-win.start));return(<div style={{position:'absolute',left,top:7,height:TRACK_H-14,width,background:'rgba(90,180,255,.22)',border:'1px solid rgba(90,180,255,.55)',borderRadius:4,zIndex:1,cursor:'move'}} onMouseDown={e=>{e.stopPropagation();dragBlockRef.current={trackId:tr.id,mode:'move',start:win.start,end:win.end,startClientX:e.clientX};}}><div style={{position:'absolute',left:0,top:0,bottom:0,width:6,cursor:'ew-resize',background:'rgba(255,255,255,.08)'}} onMouseDown={e=>{e.stopPropagation();dragBlockRef.current={trackId:tr.id,mode:'start',start:win.start,end:win.end,startClientX:e.clientX};}}/><div style={{position:'absolute',right:0,top:0,bottom:0,width:6,cursor:'ew-resize',background:'rgba(255,255,255,.08)'}} onMouseDown={e=>{e.stopPropagation();dragBlockRef.current={trackId:tr.id,mode:'end',start:win.start,end:win.end,startClientX:e.clientX};}}/><div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontFamily:'var(--fm)',color:'var(--blue)',pointerEvents:'none'}}>layer block</div></div>);})()}
            {tr.kfs.map(kf=>{const isSel=selKf?.kfId===kf.id;return(<div key={kf.id} className="kfd" style={{position:'absolute',left:msToX(kf.ms)-7,top:'50%',transform:'translateY(-50%) rotate(45deg)',width:14,height:14,background:isSel?'#fff':tr.color,border:`2px solid ${isSel?'var(--accent)':'var(--bg-base)'}`,zIndex:2,boxShadow:isSel?`0 0 0 2px var(--accent),0 0 10px rgba(232,255,60,.5)`:undefined}} title={`${fmtMs(kf.ms)} · ${ENAMES[kf.easing]||kf.easing}`} onMouseDown={e=>{e.stopPropagation();tlSt.set({selKf:{trackId:tr.id,kfId:kf.id}});dragKfRef.current={trackId:tr.id,kfId:kf.id,startMs:kf.ms,startClientX:e.clientX};}} onDoubleClick={e=>{e.stopPropagation();delKf(tr.id,kf.id);}}/>);})}
          </div>
          <div style={{width:ADD_W,flexShrink:0,borderLeft:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg-panel)'}}><button onClick={()=>addKf(tr.id)} title="Capture KF" style={{background:'none',border:'none',cursor:'pointer',color:'var(--txt3)',fontSize:17,padding:0,lineHeight:1}} onMouseEnter={e=>e.currentTarget.style.color='var(--accent)'} onMouseLeave={e=>e.currentTarget.style.color='var(--txt3)'}>◇</button></div>
        </div>);})}
        <div style={{position:'absolute',left:phX-1,top:0,bottom:0,width:2,background:'var(--accent)',opacity:.65,pointerEvents:'none',zIndex:6}}><div style={{position:'absolute',top:RULER_H-6,left:-4,width:10,height:10,background:'var(--accent)',transform:'rotate(45deg)'}}/></div>
      </div>
    </div>
    <div style={{padding:'3px 12px',fontSize:9,color:'var(--txt3)',fontFamily:'var(--fm)',borderTop:'1px solid var(--border)',display:'flex',gap:10,flexWrap:'wrap',flexShrink:0}}><span>Click lane → scrub</span><span style={{opacity:.3}}>·</span><span>◇ → capture KF</span><span style={{opacity:.3}}>·</span><span>Drag diamonds → move KF</span><span style={{opacity:.3}}>·</span><span>Drag layer block / edges → duration</span><span style={{opacity:.3}}>·</span><span>Row order drives viewport stack</span></div>
  </div>);
}
